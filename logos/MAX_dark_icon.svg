<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="MAX logo icon in dark theme">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06080a"/>
      <stop offset="0.58" stop-color="#090909"/>
      <stop offset="1" stop-color="#13110f"/>
    </linearGradient>

    <pattern id="vStripe" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="3" height="6" fill="#0c0f13" fill-opacity="0.46"/>
      <rect x="3" width="3" height="6" fill="#17191d" fill-opacity="0.16"/>
    </pattern>

    <radialGradient id="goldGlow" cx="0.84" cy="0.14" r="0.7">
      <stop offset="0" stop-color="#caa446" stop-opacity="0.30"/>
      <stop offset="0.30" stop-color="#8e6d26" stop-opacity="0.14"/>
      <stop offset="0.62" stop-color="#4d3a10" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="topSoftLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.14" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="0.24" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bottomShade" x1="0" y1="0.72" x2="0" y2="1">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>

    <linearGradient id="logoFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f2e8"/>
      <stop offset="1" stop-color="#efe9db"/>
    </linearGradient>

    <clipPath id="clip">
      <rect x="4" y="4" width="504" height="504" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
