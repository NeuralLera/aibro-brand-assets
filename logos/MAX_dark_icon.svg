    <rect width="512" height="512" fill="url(#bgBase)"/>
    <rect width="512" height="512" fill="url(#vStripe)" opacity="0.95"/>
    <rect width="512" height="512" fill="url(#goldGlow)"/>
    <rect width="512" height="512" fill="url(#bottomShade)"/>
    <rect width="512" height="512" fill="url(#topSoftLight)"/>
  </g>

  <rect x="5" y="5" width="502" height="502" rx="107" ry="107" fill="none" stroke="#5f6062" stroke-opacity="0.60" stroke-width="10"/>

