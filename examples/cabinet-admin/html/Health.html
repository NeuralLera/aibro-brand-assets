function MetricGraph({ label, color, values, peak, latest, unit }) {
  const W = 280, H = 80, PT = 8, PB = 18, PL = 4, PR = 4;
  const innerW = W - PL - PR;
  const innerH = H - PT - PB;
  const min = 0;
  const max = 100;
  const step = innerW / (values.length - 1);
  const pts = values.map((v, i) => [PL + i * step, PT + innerH - ((v - min) / (max - min)) * innerH]);
  const d = "M " + pts.map((p) => `${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" L ");
  const area = d + ` L ${PL + innerW} ${PT + innerH} L ${PL} ${PT + innerH} Z`;
  const gradId = `g-${label.replace(/\s/g, "")}`;

  return (
    <div className="mtg">
      <div className="mtg-h">
        <div className="mtg-lbl">{label}</div>
        <div className="mtg-vl">
          <span className="latest">{latest}{unit}</span>
          <span className="peak">peak {peak}{unit}</span>
        </div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.22" />
            <stop offset="100%" stopColor={color} stopOpacity="0" />
          </linearGradient>
        </defs>
        {/* 3 grid lines */}
        {[25, 50, 75].map((g) => {
          const y = PT + innerH - (g / 100) * innerH;
          return <line key={g} x1={PL} y1={y} x2={W - PR} y2={y}
                       stroke="rgba(15,23,42,0.05)" strokeDasharray="2 4" />;
        })}
        <path d={area} fill={`url(#${gradId})`} />
        <path d={d} fill="none" stroke={color} strokeWidth="1.8"
              strokeLinecap="round" strokeLinejoin="round" />
        <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color} />
        <text x={PL} y={H - 4} fontFamily="var(--font-mono)" fontSize="9" fill="var(--fg-4)">−24ч</text>
        <text x={W - PR} y={H - 4} textAnchor="end" fontFamily="var(--font-mono)" fontSize="9" fill="var(--fg-4)">сейчас</text>
      </svg>
    </div>
  );
}
