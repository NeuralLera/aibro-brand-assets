// ============================================================
// Severity chip helper
// ============================================================
function sevClass(s) {
  return `sev sev--${s}`;
}
function sevLabel(s) {
  return s === "low" ? "Low" : s === "medium" ? "Medium" : s === "high" ? "High" : "Critical";
}

function actionClass(a) {
  return `act act--${a.toLowerCase()}`;
}

// ============================================================
// Drawer with raw JSON event
// ============================================================
function Drawer({ event, onClose }) {
  if (!event) return null;
  const json = JSON.stringify(
    {
      id: event.id,
      timestamp_msk: `${event.date} ${event.t}:00`,
      timestamp_utc: `${event.date.split(".").reverse().join("-")}T${event.t}:00.000Z`,
      actor: event.actor,
      action: event.action,
      severity: event.severity,
      description: event.desc,
      target: event.target,
      request: {
        ip: event.ip,
        user_agent: "Mozilla/5.0 (Macintosh; …) Chrome/132.0.0.0",
        request_id: "req_" + event.id.replace(/^evt_/, ""),
      },
      worm: {
        write_only: true,
        retention_years: 5,
        compliance: ["152-ФЗ", "115-ФЗ ст.6"],
      },
    },
    null,
    2,
  );

  return (
    <div className="drawer-bg" onClick={onClose}>
      <aside className="drawer" onClick={(e) => e.stopPropagation()}>
        <div className="drawer__h">
          <div>
            <div className="drawer__cap">EVENT DETAILS</div>
            <div className="drawer__id">{event.id}</div>
          </div>
          <button className="drawer__close" onClick={onClose} aria-label="Закрыть">×</button>
        </div>
        <div className="drawer__meta">
          <div className="drawer__meta-row">
            <span className="l">Actor:</span>
            <span className="v"><b>{event.actor.name}</b> · {event.actor.role}</span>
          </div>
          <div className="drawer__meta-row">
            <span className="l">Action:</span>
            <span className="v"><span className={actionClass(event.action)}>{event.action}</span></span>
          </div>
          <div className="drawer__meta-row">
            <span className="l">Severity:</span>
            <span className="v"><span className={sevClass(event.severity)}>{sevLabel(event.severity)}</span></span>
          </div>
          <div className="drawer__meta-row">
            <span className="l">Target:</span>
            <span className="v mono">{event.target.type} · {event.target.id}</span>
          </div>
          <div className="drawer__meta-row">
            <span className="l">IP:</span>
            <span className="v mono">{event.ip}</span>
          </div>
        </div>
        <div className="drawer__json">
          <div className="drawer__json-cap">
            <Icon name="file-text" />
            <span>RAW JSON event</span>
            <button className="btn btn--ghost" style={{ marginLeft: "auto", height: 24, fontSize: 11 }}>
              <Icon name="icon-action-export" />Скопировать
            </button>
          </div>
          <pre className="drawer__json-body">{json}</pre>
        </div>
        <div className="drawer__foot">
          <Icon name="lock" />
          <span>WORM-режим · изменение или удаление этой записи невозможно</span>
        </div>
      </aside>
    </div>
  );
}

// ============================================================
// Timeline
// ============================================================
function Timeline({ onOpen }) {
  // Group by date
  const groups = useMemo(() => {
    const map = new Map();
    EVENTS.forEach((e) => {
      if (!map.has(e.date)) map.set(e.date, []);
      map.get(e.date).push(e);
    });
    return Array.from(map.entries());
  }, []);

  return (
    <div className="card audit-card">
      <div className="card-h">
        <h3>Хронология событий</h3>
        <span className="meta">{EVENTS.length} событий · сортировка: новые сверху</span>
        <div className="right">
          <button className="btn btn--ghost"><Icon name="icon-action-sort" />Сортировка</button>
          <button className="btn btn--ghost"><Icon name="bar-chart" />По актору</button>
        </div>
      </div>
      <div className="audit-tl">
        {groups.map(([date, events]) => (
          <div key={date} className="audit-tl__group">
            <div className="audit-tl__date">
              <Icon name="calendar" />
              <span>{date}</span>
              <span className="audit-tl__date-count">{events.length} событий</span>
            </div>
            {events.map((e) => (
              <div key={e.id} className="audit-row">
                <div className="audit-row__rail">
                  <div className={`audit-row__dot audit-row__dot--${e.severity}`}></div>
                  <div className="audit-row__line"></div>
                </div>
                <div className="audit-row__time" title={`${e.date} ${e.t}:00 МСК`}>
                  <div className="audit-row__t">{e.t}</div>
                  <div className="audit-row__rel">{e.rel}</div>
                </div>
                <div className={`audit-row__actor audit-row__actor--${e.actor.kind}`}>
                  <div className="audit-row__avatar">
                    {e.actor.kind === "sys"
                      ? <Icon name="lock" />
                      : e.actor.initials}
                  </div>
                </div>
                <div className="audit-row__body">
                  <div className="audit-row__top">
                    <span className="audit-row__name">{e.actor.name}</span>
                    <span className="audit-row__role">{e.actor.role}</span>
                    <span className={actionClass(e.action)}>{e.action}</span>
                    <span className={sevClass(e.severity)}>{sevLabel(e.severity)}</span>
                  </div>
                  <div className="audit-row__desc">{e.desc}</div>
                  <div className="audit-row__target">
                    <Icon name="external-link" />
                    <span className="audit-row__target-type">{e.target.type}</span>
                    <a href="#" className="audit-row__target-id">{e.target.id}</a>
                    <span className="audit-row__target-sep">·</span>
                    <span className="audit-row__target-label">{e.target.label}</span>
                  </div>
                </div>
                <div className="audit-row__cta">
                  <button className="btn btn--ghost" onClick={() => onOpen(e)}>
                    <Icon name="file-text" />Details
                  </button>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>
      <div className="audit-card__foot">
        <div className="audit-card__foot-l">
          Показано <b>{EVENTS.length}</b> из <b>1 240</b> событий за месяц
        </div>
        <div className="audit-card__foot-r">
          <button className="btn btn--secondary"><Icon name="icon-action-export" />Export selected as CSV</button>
          <button className="btn btn--secondary"><Icon name="icon-action-download" />Export full month as JSON</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// WORM info box
// ============================================================
function WormInfoBox() {
  return (
    <div className="info-box">
      <div className="info-box__ic">
        <Icon name="shield-check" />
      </div>
      <div className="info-box__body">
        <div className="info-box__t1">Аудит-log хранится <b>5 лет в WORM-режиме</b> (write-once-read-many)</div>
        <div className="info-box__t2">
          Изменение или удаление записей невозможно. Соответствует требованиям <b>152-ФЗ</b> «О персональных данных» и финансового мониторинга
          (ст. 6 <b>115-ФЗ</b> «О противодействии легализации доходов»).
        </div>
      </div>
      <div className="info-box__chips">
        <span className="chip chip--ok"><span className="dot"></span>WORM · 5 лет</span>
        <span className="chip chip--ord"><span className="dot"></span>152-ФЗ</span>
        <span className="chip chip--ord"><span className="dot"></span>115-ФЗ ст.6</span>
      </div>
    </div>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [nav, setNav] = useState("audit");
  const [period, setPeriod] = useState("Сегодня");
  const [action, setAction] = useState("Все");
  const [severity, setSeverity] = useState("Все");
  const [drawer, setDrawer] = useState(null);

  return (
    <div className="shell" data-screen-label="09 Admin — Аудит log">
      <Sidebar current={nav} onNav={setNav} />
      <div className="workpane">
        <TopNav />
        <main className="main">
          <PageHeader />
          <KpiRow />
          <Filters
            period={period} onPeriod={setPeriod}
            action={action} onAction={setAction}
            severity={severity} onSeverity={setSeverity}
          />
          <Timeline onOpen={setDrawer} />
          <WormInfoBox />
        </main>
      </div>
      <Drawer event={drawer} onClose={() => setDrawer(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
