function TopicDonut() {
  // Topic distribution donut — pure SVG
  const data = [
    { label: "Биллинг",     value: 38, color: "#3b82f6" },
    { label: "Интеграция",  value: 24, color: "#f59e0b" },
    { label: "CRM",         value: 22, color: "#10b981" },
    { label: "Аккаунт",     value: 12, color: "#6b7079" },
    { label: "Прочее",      value:  4, color: "#a7f3d0" },
  ];
  const total = data.reduce((s, d) => s + d.value, 0);
  const R = 52, C = 2 * Math.PI * R;
  let offset = 0;

  return (
    <div className="topic-chart">
      <div className="donut">
        <svg viewBox="0 0 140 140" width="140" height="140">
          <circle cx="70" cy="70" r={R} fill="none" stroke="var(--bg-subtle)" strokeWidth="14" />
          {data.map((d, i) => {
            const len = (d.value / total) * C;
            const circle = (
              <circle key={i} cx="70" cy="70" r={R} fill="none"
                stroke={d.color} strokeWidth="14"
                strokeDasharray={`${len} ${C - len}`}
                strokeDashoffset={-offset}
                transform="rotate(-90 70 70)"
                strokeLinecap="butt"
              />
            );
            offset += len;
            return circle;
          })}
          <text x="70" y="68" textAnchor="middle" fontFamily="var(--font-display)"
                fontSize="22" fontWeight="700" fill="var(--fg-1)">100%</text>
          <text x="70" y="86" textAnchor="middle" fontFamily="var(--font-mono)"
                fontSize="9" fill="var(--fg-3)" letterSpacing="0.1em">ВСЕ ТИКЕТЫ</text>
        </svg>
      </div>
      <div className="legend">
        {data.map((d) => (
          <div key={d.label} className="lg-row">
            <span className="sw" style={{ background: d.color }} />
            <span className="lb">{d.label}</span>
            <span className="vl">{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SlaTimeline() {
  // mini bar chart — SLA per week (8 weeks)
  const SLA = [88, 91, 93, 92, 90, 89, 92, 92];
  const W = 240, H = 100, PT = 14, PB = 22, PL = 4, PR = 4;
  const innerW = W - PL - PR;
  const innerH = H - PT - PB;
  const barW = innerW / SLA.length - 6;
  return (
    <div className="sla-mini">
      <div className="sla-head">
        <div className="cap">SLA · последние 8 недель</div>
        <div className="vl"><b>92%</b> <span>last 30d</span></div>
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
        {/* threshold line 95% */}
        <line x1={PL} y1={PT + innerH - (95 - 80) / 20 * innerH}
              x2={W - PR} y2={PT + innerH - (95 - 80) / 20 * innerH}
              stroke="var(--brand-500)" strokeWidth="1" strokeDasharray="3 3" opacity="0.4" />
        <text x={W - PR} y={PT + innerH - (95 - 80) / 20 * innerH - 3}
              textAnchor="end" fontFamily="var(--font-mono)" fontSize="9" fill="var(--brand-700)">95% цель</text>
        {SLA.map((v, i) => {
          const x = PL + i * (innerW / SLA.length) + 3;
          const h = ((v - 80) / 20) * innerH;
          const y = PT + innerH - h;
          const tone = v >= 92 ? "var(--brand-500)" : v >= 90 ? "var(--warning-500)" : "var(--danger-500)";
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={h} rx="2" fill={tone} opacity="0.85" />
              <text x={x + barW / 2} y={H - 8} textAnchor="middle"
                    fontFamily="var(--font-mono)" fontSize="9" fill="var(--fg-3)">W{i + 1}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

        </div>
      </div>
    </aside>
  );
}

// ============================================================
// Drawer — ticket details
// ============================================================
const MESSAGES = [
  { t: "12:33", who: "Анна Соколова",  side: "client",
    body: "Здравствуйте! С 12:00 ассистент не отвечает на сообщения в MAX. Подскажите, пожалуйста, что делать?" },
  { t: "12:46", who: "Никита Ш.",  side: "support",
    body: "Анна, здравствуйте. Мы проверяем — кажется, проблема на стороне MAX webhook. Дайте 15 минут на диагностику." },
  { t: "13:02", who: "System",  side: "system",
    body: "Тикет повышен до P0 · webhook ошибки подтверждены (12 за час)" },
  { t: "13:18", who: "Никита Ш.",  side: "support",
    body: "Запустил retry-очередь. Сейчас будем восстанавливать недоставленные ответы. Держим в курсе." },
  { t: "14:25", who: "Анна Соколова",  side: "client",
    body: "Ответы пошли! Спасибо большое." },
];

function Drawer({ ticket, onClose }) {
  if (!ticket) return null;
  const topic = TOPICS[ticket.topic];
  return (
    <>
      <div className="drawer-scrim is-open" onClick={onClose} />
      <aside className="drawer is-open">
        <div className="drawer-h">
          <div className="top">
            <div className="ttl">
              <div className="t-id"><span className={`ticket-prio ticket-prio--${ticket.prio.toLowerCase()}`}>{ticket.prio}</span><span className="mono">{ticket.id}</span></div>
              <h2>{ticket.subject}</h2>
              <div className="meta">
                <span className="bz-cell">
                  <span className={`avatar-xs ${ticket.biz.color}`}>{ticket.biz.initials}</span>
                  <span className="nm">{ticket.biz.name}</span>
                </span>
                <span className="sep">·</span>
                <span>{ticket.author}</span>
                <span className="sep">·</span>
                <span className={`topic-chip is-${topic.tone}`}>{topic.label}</span>
                <span className="sep">·</span>
                <span>возраст {ticket.age}</span>
              </div>
            </div>
            <button className="close-btn" onClick={onClose}>×</button>
          </div>

          <div className="quick-actions">
            <button className="btn btn--primary"><Icon name="message-circle" />Ответить</button>
            <button className="btn btn--secondary"><Icon name="icon-nav-team" />Назначить</button>
            <button className="btn btn--secondary"><Icon name="icon-status-success" />Закрыть</button>
            <span style={{ flex: 1 }} />
            <button className="btn btn--danger"><Icon name="icon-status-error" />Перевести в P0</button>
          </div>
        </div>

        <div className="drawer-body">
          <div className="dr-section">
            <h4>Переписка · {MESSAGES.length} сообщений</h4>
            <div className="timeline-msg">
              {MESSAGES.map((m, i) => (
                <div key={i} className={`msg msg--${m.side}`}>
                  <div className="msg-h">
                    <span className="who">{m.who}</span>
                    <span className="t">{m.t}</span>
                  </div>
                  <div className="msg-body">{m.body}</div>
                </div>
              ))}
            </div>

            <div className="msg-reply">
              <textarea placeholder="Напишите ответ автору тикета…" rows="4" />
              <div className="reply-toolbar">
                <button className="btn btn--ghost"><Icon name="attachment" />Файл</button>
                <span style={{ flex: 1 }} />
                <button className="btn btn--ghost">Шаблон</button>
                <button className="btn btn--primary">Отправить</button>
              </div>
            </div>
          </div>

          <div className="dr-section">
            <h4>Детали</h4>
            <div className="kv-grid">
              <div className="kv"><div className="k">ID тикета</div><div className="v" style={{ fontFamily: "var(--font-mono)" }}>{ticket.id}</div></div>
              <div className="kv"><div className="k">Приоритет</div><div className="v"><span className={`ticket-prio ticket-prio--${ticket.prio.toLowerCase()}`}>{ticket.prio}</span></div></div>
              <div className="kv"><div className="k">Создан</div><div className="v">15.05.2026 · 12:33 МСК</div></div>
              <div className="kv"><div className="k">SLA до ответа</div><div className="v">в течение часа · <span style={{ color: "var(--success-700)" }}>в норме</span></div></div>
              <div className="kv"><div className="k">Источник</div><div className="v">MAX в-аппе</div></div>
              <div className="kv"><div className="k">Канал ответов</div><div className="v">e-mail + MAX</div></div>
            </div>
          </div>
        </div>
      </aside>
    </>
  );
}

// ============================================================
// App
// ============================================================
function App() {
  const [tab, setTab] = useState("open");
  const [openId, setOpenId] = useState(null);
  const filtered = useMemo(() => {
    if (tab === "all") return TICKETS;
    if (tab === "open") return TICKETS.filter((t) => t.status === "open");
    if (tab === "inprogress") return TICKETS.filter((t) => t.status === "inprogress");
    return TICKETS;
  }, [tab]);

  const openTicket = openId ? TICKETS.find((t) => t.id === openId) : null;

  return (
    <div className="shell" data-screen-label="04 Admin — Поддержка">
      <Sidebar current="support" />
      <div className="workpane">
        <TopNav crumb={<>admin / <b>поддержка</b></>} title="Поддержка" />
        <main className="main">
          <PageHeader />
          <KpiRow />
          <TopTabs tab={tab} onTab={setTab} />
          <Filters />

          <div className="sup-layout">
            <TicketsTable rows={filtered} openId={openId} onOpen={setOpenId} />
            <AnalyticsPanel />
          </div>
        </main>
      </div>

      <Drawer ticket={openTicket} onClose={() => setOpenId(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
