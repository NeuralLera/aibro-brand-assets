function TabBar({ tab, setTab }) {

/* ============================================================
   Reusable: Section Card
============================================================ */
function SectionCard({ title, subtitle, children, foot }) {
  return (
    <section className="st-card">
      {(title || subtitle) && (
        <header className="st-card-h">
          {title && <h3>{title}</h3>}
          {subtitle && <p>{subtitle}</p>}
        </header>
      )}
      <div className="st-card-body">{children}</div>
      {foot && <footer className="st-card-foot">{foot}</footer>}
    </section>
  );
}

/* ============================================================

============================================================ */
function Toast({ msg }) {
  if (!msg) return null;
  return <div className="ref-toast">{msg}</div>;
}
