/* Fake payment history for drawer (per referral) */
function buildPayments(item) {
  const months = ["май 2026","апр 2026","мар 2026","фев 2026","янв 2026","дек 2025","ноя 2025","окт 2025","сен 2025","авг 2025","июл 2025","июн 2025"];
  if (item.status !== "active") return [];
  const take = Math.min(item.monthsActive, months.length);
  return months.slice(0, take).map((m, i) => ({
    period: m,
    amount: 499,
    status: i === 0 ? "pending" : "paid",
  }));
}

/* ============================================================
   DRAWER — referral details + payment history
============================================================ */
function Drawer({ item, onClose }) {
  useEffect(() => {
    if (!item) return;
    function onKey(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [item, onClose]);

  if (!item) return <div className="tx-drawer-bg"></div>;

  const st = STATUS_META[item.status];
  const payments = buildPayments(item);
  const lifetimeIncome = payments.reduce((s, p) => s + p.amount, 0);
  const lifetimePaid   = payments.filter(p => p.status === "paid").reduce((s, p) => s + p.amount, 0);

  return (
    <>
      <div className="tx-drawer-bg open" onClick={onClose}></div>
      <aside className="tx-drawer ref-drawer open" role="dialog" aria-label="Детали реферала">
        <div className="tx-drawer-h">
          <div>
            <div className="crumb">Реферал · {item.id}</div>
            <h3>{item.name}</h3>
            <div className="meta">{item.handle} · {item.contact}</div>
          </div>
          <button className="tx-drawer-close" onClick={onClose} aria-label="Закрыть"></button>
        </div>

        <div className="tx-drawer-amount">
          <div className="lbl">Доход за всё время</div>
          <div className="val">+{fmt(lifetimeIncome)}<span className="unit">&nbsp;₽</span></div>
          <div className="sub">
            Выплачено <b>{fmt(lifetimePaid)}&nbsp;₽</b>
            {lifetimeIncome - lifetimePaid > 0 && (
              <> · ожидает выплату <b style={{color:"var(--warning-700)"}}>{fmt(lifetimeIncome - lifetimePaid)}&nbsp;₽</b></>
            )}
          </div>
        </div>

        <div className="tx-drawer-detail">
          <div className="tx-row"><span className="k">Статус</span>
            <span className="v">
              <span className={`ref-st-badge ${st.cls}`} style={{verticalAlign:"middle"}}>
                <Ic name={st.icon} size={12} />{st.label}
              </span>
            </span>
          </div>
          <div className="tx-row"><span className="k">Уровень</span>
            <span className="v">
              <span className={`lvl-chip ${item.level === "L1" ? "l1" : "l2"}`}>
                <span className="dot"></span>{item.level}
              </span>
            </span>
          </div>
          <div className="tx-row"><span className="k">Зарегистрирован</span><span className="v mono">{item.registered}</span></div>
          <div className="tx-row"><span className="k">Тариф</span><span className="v">Единый · 4 990 ₽/мес</span></div>
          <div className="tx-row"><span className="k">Ваш процент</span><span className="v brand">10 % lifetime</span></div>
          <div className="tx-row"><span className="k">Платящих месяцев</span><span className="v">{item.monthsActive}</span></div>

          <div className="tx-drawer-sec">
            <h4>История начислений</h4>
            {payments.length === 0 ? (
              <div className="ref-pay-empty">
                {item.status === "trial"        && "Реферал на пробном периоде — начислений ещё не было."}
                {item.status === "unsubscribed" && "Реферал отписался от подписки."}
                {item.status === "paused"       && "Подписка на паузе — начисления приостановлены."}
              </div>
            ) : (
              <div className="ref-pay-list">
                {payments.map((p, i) => (
                  <div key={i} className="ref-pay-row">
                    <span className="ref-pay-period">{p.period}</span>
                    <span className={`ref-pay-status ref-pay-${p.status}`}>
                      {p.status === "paid" ? "Выплачено" : "К выплате"}
                    </span>
                    <span className="ref-pay-amount">+{fmt(p.amount)}&nbsp;₽</span>
                  </div>
                ))}
                <div className="ref-pay-row ref-pay-total">
                  <span className="ref-pay-period">Итого</span>
                  <span></span>
                  <span className="ref-pay-amount">+{fmt(lifetimeIncome)}&nbsp;₽</span>
                </div>
              </div>
            )}
          </div>
        </div>

        <div className="tx-drawer-foot">
          <button>
            <Ic name="message-circle" size={14} />
            Написать
          </button>
          <button className="primary">
            <Ic name="icon-action-external-link" size={14} style={{filter:"brightness(0) invert(1)"}} />
            Профиль бизнеса
          </button>
        </div>
      </aside>
    </>
  );
}

/* ============================================================
   TOAST
============================================================ */
function Toast({ msg }) {
  if (!msg) return null;
  return <div className="ref-toast">{msg}</div>;
}

/* ============================================================
   APP
============================================================ */
function App() {
  const [level, setLevel]         = useState("all");
  const [status, setStatus]       = useState("all");
  const [search, setSearch]       = useState("");
  const [dateRange, setDateRange] = useState("all");
  const [selected, setSelected]   = useState(null);
  const [toast, setToast]         = useState("");

  function fireToast(m) {
    setToast(m);
    setTimeout(() => setToast(""), 2200);
  }

  const dateFilter = (r) => {
    if (dateRange === "all")  return true;
    if (dateRange === "30d")  return r.regTs >= 20260416;
    if (dateRange === "90d")  return r.regTs >= 20260216;
    if (dateRange === "year") return r.regTs >= 20260101;
    return true;
  };
  const levelFilter  = (r) => level === "all" || r.level === level;
  const searchFilter = (r) => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return r.name.toLowerCase().includes(q)
        || r.handle.toLowerCase().includes(q)
        || r.contact.toLowerCase().includes(q);
  };

  // Apply level + date + search (without status) for pill counts
  const noStatusList = REFERRALS.filter(r => levelFilter(r) && dateFilter(r) && searchFilter(r));
  const counts = {
    all:          noStatusList.length,
    trial:        noStatusList.filter(r => r.status === "trial").length,
    active:       noStatusList.filter(r => r.status === "active").length,
    unsubscribed: noStatusList.filter(r => r.status === "unsubscribed").length,
    paused:       noStatusList.filter(r => r.status === "paused").length,
  };

  const rows = noStatusList.filter(r => status === "all" || r.status === status);

  // KPI stats — spec totals (organization-level — bigger than 12-row sample)
  const stats = useMemo(() => ({
    total:  47,
    active: 38,
    trial:  9,
    l1:     32,
    l2:     15,
  }), []);

  return (
    <div className="pd" data-screen-label="03 Партнёры — Рефералы">
      <Sidebar current="referrals" />

      <div className="pd-work">
        <TopBar onBurger={() => {}} />
        <main className="pd-page">
          <div className="pd-pgh">
            <div>
              <h2>Мои рефералы</h2>
              <div className="sub">Бизнесы, которых вы привели в СММ АЙБРО. L1 — прямые приглашения, L2 — те, кого пригласили ваши L1.</div>
            </div>
          </div>

          <ShareBlock onToast={fireToast} />

          <KpiRow stats={stats} />

          <FiltersBar
            level={level}     setLevel={setLevel}
            status={status}   setStatus={setStatus}
            search={search}   setSearch={setSearch}
            dateRange={dateRange} setDateRange={setDateRange}
            counts={counts} />

          <ReferralsTable
            rows={rows}
            onSelect={setSelected}
            selectedId={selected?.id} />

          <div className="ref-cta">
            <div className="ref-cta-ico"><Ic name="megaphone" size={22} /></div>
            <div className="ref-cta-body">
              <b>Хотите больше рефералов?</b><br/>
              Скачайте промо‑материалы — баннеры, шаблоны постов, готовые сценарии разговоров — и делитесь ими в чатах и соцсетях.
            </div>
            <a className="ref-cta-link" href="#materials">
              Перейти в раздел «Материалы»
              <Ic name="icon-action-external-link" size={14} />
            </a>
          </div>

          <div style={{marginTop: 8, fontSize: 11, color: "var(--fg-3)", lineHeight: 1.6, maxWidth: 720}}>
            Доход с подписки реферала начисляется ежемесячно — пока бизнес продолжает платить. Триал не приносит начислений; ИП Мальцев Валерий Валерьевич (ИНН 519041916737, Т‑Банк СПб) выступает налоговым агентом для партнёров без НПД — НДФЛ удерживается при выплате.
          </div>
        </main>
      </div>

      <Drawer item={selected} onClose={() => setSelected(null)} />
      <Toast msg={toast} />

      <nav className="pd-bottomnav" aria-label="Мобильная навигация">
        {NAV_MAIN.slice(0, 5).map((it) => {
          const cls = `pd-bottomnav-item ${it.id === "referrals" ? "active" : ""}`;
          const body = <>
            <span className="ico"><Ic name={it.icon} size={22} /></span>
            <span>{it.label}</span>
          </>;
          return it.href
            ? <a key={it.id} className={cls} href={it.href} style={{textDecoration:"none"}}>{body}</a>
            : <button key={it.id} className={cls}>{body}</button>;
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
