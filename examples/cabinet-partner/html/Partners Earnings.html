/* ============================================================
   STACKED BAR CHART
============================================================ */
function BarsChart() {
  const W = 760, H = 240, PAD_L = 48, PAD_R = 16, PAD_T = 18, PAD_B = 40;
  const data = MONTHS;
  const totals = data.map(d => d.l1 + d.l2);
  const max = Math.max(...totals) * 1.18;
  const yScale = (v) => PAD_T + (H - PAD_T - PAD_B) * (1 - v / max);
  const innerW = W - PAD_L - PAD_R;
  const slot = innerW / data.length;
  const barW = Math.min(34, slot * 0.55);

  const ticks = [0, 1, 2, 3, 4].map(i => max * (i / 4));

  const [hover, setHover] = useState(null);
  const wrapRef = useRef(null);

  const totalL1 = data.reduce((s, d) => s + d.l1, 0);
  const totalL2 = data.reduce((s, d) => s + d.l2, 0);

  return (
    <div className="pd-card bars-card">
      <div className="pd-card-h">
        <h3>Динамика дохода · 12 месяцев</h3>
        <div className="legend">
          <span><span className="swatch l1"></span>L1 — прямые</span>
          <span><span className="swatch l2"></span>L2 — под‑партнёры</span>
        </div>
      </div>

      <div className="bars-summary">
        <div className="blk">
          <div className="lbl">Всего</div>
          <div className="val">{fmtRub(totalL1 + totalL2)}</div>
        </div>
        <div className="blk">
          <div className="lbl">L1 · прямые</div>
          <div className="val l1">{fmtRub(totalL1)}</div>
        </div>
        <div className="blk">
          <div className="lbl">L2 · под‑партнёры</div>
          <div className="val l2">{fmtRub(totalL2)}</div>
        </div>
      </div>

      <div className="bars-wrap" ref={wrapRef}
           onMouseLeave={() => setHover(null)}>
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" role="img"
             aria-label="Bar chart — доход по месяцам">
          {/* grid */}
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={PAD_L} x2={W - PAD_R}
                    y1={yScale(t)} y2={yScale(t)}
                    stroke="rgba(15,23,42,0.06)" strokeDasharray={i === 0 ? "" : "3 4"} />
              <text x={PAD_L - 8} y={yScale(t) + 3}
                    textAnchor="end" fontSize="10"
                    fontFamily="JetBrains Mono, monospace"
                    fill="#6b7079"
                    style={{fontVariantNumeric: "tabular-nums"}}>
                {(t / 1000).toFixed(t === 0 ? 0 : 0)}к
              </text>
            </g>
          ))}

          {/* bars */}
          {data.map((d, i) => {
            const total = d.l1 + d.l2;
            const xCenter = PAD_L + slot * (i + 0.5);
            const x = xCenter - barW / 2;
            const yTotal = yScale(total);
            const yL1Top = yScale(d.l1);
            const baseY = H - PAD_B;
            const isHover = hover && hover.i === i;
            return (
              <g key={i}
                 onMouseEnter={() => setHover({ i, x: ((xCenter) / W) * 100, y: (yTotal / H) * 100 })}
                 style={{cursor: "pointer"}}>
                {/* L1 (bottom) */}
                <rect x={x} y={yL1Top}
                      width={barW} height={Math.max(0, baseY - yL1Top)}
                      fill="#10b981"
                      opacity={isHover ? 1 : 0.92}
                      rx="2" />
                {/* L2 (top) */}
                {d.l2 > 0 && (
                  <rect x={x} y={yTotal}
                        width={barW} height={Math.max(0, yL1Top - yTotal)}
                        fill="#6ee7b7"
                        opacity={isHover ? 1 : 0.95}
                        rx="2" />
                )}
                {/* invisible hover hit area */}
                <rect x={PAD_L + slot * i} y={PAD_T}
                      width={slot} height={H - PAD_T - PAD_B}
                      fill="transparent" />
                {/* x label */}
                <text x={xCenter} y={H - PAD_B + 20}
                      textAnchor="middle" fontSize="11"
                      fontFamily="Golos Text, sans-serif"
                      fill={isHover ? "#0e0f12" : "#6b7079"}
                      fontWeight={isHover ? 600 : 400}>
                  {d.m}
                </text>
              </g>
            );
          })}
        </svg>

        {hover && (
          <div className="bars-tooltip show"
               style={{ left: `${hover.x}%`, top: `${hover.y}%` }}>
            <div className="m">{data[hover.i].m}</div>
            <div className="row">
              <span className="k"><span className="sw" style={{background:"#10b981"}}></span>L1</span>

/* ============================================================
   TRANSACTIONS TABLE + DRAWER + PAGINATION
============================================================ */
const PAGE_SIZE = 20;

function TransactionsTable({ rows, onSelect, selectedId, sort, setSort, search, setSearch, page, setPage }) {
  const sorted = useMemo(() => {
    const list = [...rows];
    list.sort((a, b) => {
      let av, bv;
      if (sort.key === "date") { av = a.ts; bv = b.ts; }
      else if (sort.key === "amount") { av = a.amount; bv = b.amount; }
      else if (sort.key === "ref") { av = a.ref; bv = b.ref; }
      else { av = a.ts; bv = b.ts; }
      if (av < bv) return sort.dir === "asc" ? -1 : 1;
      if (av > bv) return sort.dir === "asc" ? 1 : -1;
      return 0;
    });
    return list;
  }, [rows, sort]);

  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  const start = (page - 1) * PAGE_SIZE;
  const visible = sorted.slice(start, start + PAGE_SIZE);

  function toggleSort(key) {
    setSort(s => s.key === key ? { key, dir: s.dir === "asc" ? "desc" : "asc" } : { key, dir: "desc" });
  }
  function sortClass(key) {
    if (sort.key !== key) return "sortable";
    return "sortable " + (sort.dir === "asc" ? "sort-asc" : "sort-desc");
  }

  return (
    <div className="pd-card tx-card">
      <div className="tx-h">
        <h3>Транзакции</h3>
        <span className="meta">{fmt(total)} последних из {fmt(95)} в периоде</span>
        <div className="tx-search">
          <input value={search}
                 onChange={(e) => { setSearch(e.target.value); setPage(1); }}
                 placeholder="Поиск по рефералу или ID…"
                 aria-label="Поиск по транзакциям" />
        </div>
      </div>

      {total === 0 ? (
        <div className="tx-empty">
          <div className="h">Транзакций не найдено</div>
          Попробуйте сбросить фильтры или изменить поисковый запрос.
        </div>
      ) : (
        <>
          <div className="tx-table-wrap">
            <table className="tx-table">
              <thead>
                <tr>
                  <th className={sortClass("date")} onClick={() => toggleSort("date")}>
                    Дата<span className="sort"></span>
                  </th>
                  <th className={sortClass("ref")} onClick={() => toggleSort("ref")}>
                    Реферал<span className="sort"></span>
                  </th>
                  <th>Уровень</th>
                  <th>Подписка</th>
                  <th>Период</th>
                  <th className={"num " + sortClass("amount")} onClick={() => toggleSort("amount")}>
                    Сумма<span className="sort"></span>
                  </th>
                  <th>Статус</th>
                </tr>
              </thead>
              <tbody>
                {visible.map((t) => {
                  const st = STATUS_META[t.status];
                  return (
                    <tr key={t.id}
                        className={selectedId === t.id ? "selected" : ""}
                        onClick={() => onSelect(t)}>
                      <td data-l="Дата" className="date">{t.date}</td>
                      <td data-l="Реферал">
                        <div className="ref-name">{t.ref}</div>
                        <div className="ref-handle">{t.handle}</div>
                      </td>
                      <td data-l="Уровень">
                        <span className={`lvl-chip ${t.level === "L1" ? "l1" : "l2"}`}>
                          <span className="dot"></span>{t.level}
                        </span>
                      </td>
                      <td data-l="Подписка" className="plan">{t.plan}</td>
                      <td data-l="Период" className="period-cell">{t.period}</td>
                      <td data-l="Сумма" className="num">+{fmt(t.amount)}&nbsp;₽</td>
                      <td data-l="Статус">
                        <span className={`st-badge ${t.status}`}>
                          <Ic name={st.icon} size={12} />{st.label}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          <div className="pag">
            <div className="pag-info">
              Показано <b>{start + 1}–{Math.min(start + PAGE_SIZE, total)}</b> из <b>{fmt(total)}</b>
            </div>
            <div className="pag-buttons">
              <button disabled={page === 1} onClick={() => setPage(p => Math.max(1, p - 1))}>‹</button>
              {Array.from({ length: totalPages }).map((_, i) => (
                <button key={i}
                        className={page === i + 1 ? "active" : ""}
                        onClick={() => setPage(i + 1)}>{i + 1}</button>
              ))}
              <button disabled={page === totalPages} onClick={() => setPage(p => Math.min(totalPages, p + 1))}>›</button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

/* ============================================================
   DRAWER
============================================================ */
function Drawer({ tx, onClose }) {
  // Close on Esc
  useEffect(() => {
    if (!tx) return;
    function onKey(e) { if (e.key === "Escape") onClose(); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [tx, onClose]);

  if (!tx) {
    return <div className="tx-drawer-bg"></div>;
  }
  const st = STATUS_META[tx.status];
  const ndfl = Math.round(tx.amount * 0.13);
  const net = tx.amount - ndfl;
  const payoutScheduled = tx.status === "paid"
    ? "01.05.2026 · ****9912"
    : tx.status === "pending"
      ? "01.06.2026 · ****9912"
      : "после конца периода";

  return (
    <>
      <div className="tx-drawer-bg open" onClick={onClose}></div>
      <aside className="tx-drawer open" role="dialog" aria-label="Детали транзакции">
        <div className="tx-drawer-h">
          <div>
            <div className="crumb">Транзакция · {tx.id}</div>
            <h3>{tx.ref}</h3>
            <div className="meta">{tx.handle} · {tx.date}</div>
          </div>
          <button className="tx-drawer-close" onClick={onClose} aria-label="Закрыть"></button>
        </div>

        <div className="tx-drawer-amount">
          <div className="lbl">Начислено</div>
          <div className="val">+{fmt(tx.amount)}<span className="unit">&nbsp;₽</span></div>
          <div className="sub">
            НДФЛ 13% — −{fmt(ndfl)}&nbsp;₽ · к выплате <b style={{color:"var(--brand-700)"}}>{fmt(net)}&nbsp;₽</b>
          </div>
        </div>

        <div className="tx-drawer-detail">
          <div className="tx-row"><span className="k">Статус</span>
            <span className="v"><span className={`st-badge ${tx.status}`} style={{verticalAlign:"middle"}}>
              <Ic name={st.icon} size={12} />{st.label}
            </span></span>
          </div>
          <div className="tx-row"><span className="k">Уровень</span>
            <span className="v">
              <span className={`lvl-chip ${tx.level === "L1" ? "l1" : "l2"}`}>
                <span className="dot"></span>{tx.level}
              </span>
            </span>
          </div>
          <div className="tx-row"><span className="k">Подписка</span><span className="v">{tx.plan}</span></div>
          <div className="tx-row"><span className="k">Расчётный период</span><span className="v">{tx.period}</span></div>
          <div className="tx-row"><span className="k">Комиссия</span><span className="v brand">10% от 4 990 ₽</span></div>
          <div className="tx-row"><span className="k">Выплата</span><span className="v mono">{payoutScheduled}</span></div>
          <div className="tx-row"><span className="k">ID транзакции</span><span className="v mono">{tx.id}</span></div>

          <div className="tx-drawer-sec">
            <h4>Расчёт</h4>
            <div className="tx-row"><span className="k">Тариф реферала</span><span className="v">4 990 ₽</span></div>
            <div className="tx-row"><span className="k">Комиссия 10%</span><span className="v">+{fmt(tx.amount)} ₽</span></div>
            <div className="tx-row"><span className="k">НДФЛ 13%</span><span className="v" style={{color:"var(--fg-3)"}}>−{fmt(ndfl)} ₽</span></div>
            <div className="tx-row"><span className="k" style={{color:"var(--fg-1)"}}>Итого к выплате</span>
              <span className="v" style={{color:"var(--brand-700)",fontWeight:700,fontSize:14}}>{fmt(net)}&nbsp;₽</span>
            </div>
          </div>
        </div>

        <div className="tx-drawer-foot">
          <button>
            <Ic name="icon-action-download" size={14} />
            Скачать чек
          </button>
          <button className="primary">
            <Ic name="icon-action-external-link" size={14} style={{filter:"brightness(0) invert(1)"}} />
            Профиль реферала
          </button>
        </div>
      </aside>
    </>
  );
}

/* ============================================================
   APP
============================================================ */
function App() {
  const [period, setPeriod] = useState("year"); // default «Год» so KPIs match 12-mo total
  const [level, setLevel] = useState("all");
  const [status, setStatus] = useState("all");
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState({ key: "date", dir: "desc" });
  const [page, setPage] = useState(1);
  const [selected, setSelected] = useState(null);

  // Period filter — naive: for demo, "month" = May 2026 only; "prev" = April only; "3mo" = Mar/Apr/May; "year" = all
  const periodFilter = (t) => {
    if (period === "year" || period === "custom") return true;
    if (period === "month") return t.ts >= 20260501;
    if (period === "prev")  return t.ts >= 20260401 && t.ts < 20260501;
    if (period === "3mo")   return t.ts >= 20260301;
    return true;
  };
  const levelFilter  = (t) => level === "all" || t.level === level;
  const searchFilter = (t) => {
    const q = search.trim().toLowerCase();
    if (!q) return true;
    return t.ref.toLowerCase().includes(q) || t.handle.toLowerCase().includes(q) || t.id.toLowerCase().includes(q);
  };

  // Filtered ignoring status (used for status pill counts)
  const noStatusList = TX.filter(t => periodFilter(t) && levelFilter(t) && searchFilter(t));
  const counts = {
    all: noStatusList.length,
    accrued: noStatusList.filter(t => t.status === "accrued").length,
    pending: noStatusList.filter(t => t.status === "pending").length,
    paid:    noStatusList.filter(t => t.status === "paid").length,
  };

  const rows = noStatusList.filter(t => status === "all" || t.status === status);

  // KPI totals — derived from MONTHS aggregate, not from the sample TX rows.
  // (Table shows only 25 recent transactions; aggregates come from the chart's source data.)
  const totals = useMemo(() => {
    // map period → which months to sum and whether May is included (= pending bucket)
    let monthsSlice, includesMay;
    if (period === "month") {
      monthsSlice = MONTHS.slice(MAY_INDEX);              // May only
      includesMay = true;
    } else if (period === "prev") {
      monthsSlice = MONTHS.slice(MAY_INDEX - 1, MAY_INDEX); // April only
      includesMay = false;
    } else if (period === "3mo") {
      monthsSlice = MONTHS.slice(MAY_INDEX - 2);          // Mar, Apr, May
      includesMay = true;
    } else { // year + custom
      monthsSlice = MONTHS;                                // all 12 months
      includesMay = true;
    }

    // Apply level filter on the aggregate, too
    const lvlSum = (m) =>
      level === "L1" ? m.l1 :
      level === "L2" ? m.l2 :
                       m.l1 + m.l2;

    const total   = monthsSlice.reduce((s, m) => s + lvlSum(m), 0);
    const pending = includesMay ? lvlSum(MONTHS[MAY_INDEX]) : 0;
    const paid    = total - pending;

    return {
      accruedTotal: total,
      pending,
      paid,
      activeRefs: 38, // distinct paying referrals in current month
    };
  }, [period, level]);

  // Reset page when filters change
  useEffect(() => { setPage(1); }, [period, level, status]);

  // CSV stub
  function downloadCSV() {
    const header = "Дата;Реферал;Хэндл;Уровень;Подписка;Период;Сумма;Статус\n";
    const body = rows.map(t =>
      [t.date, t.ref, t.handle, t.level, t.plan, t.period, t.amount + " ₽", STATUS_META[t.status].label]
        .join(";")
    ).join("\n");
    const blob = new Blob([header + body], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `aibro-partner-earnings-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  return (
    <div className="pd" data-screen-label="02 Партнёры — Доход">
      <Sidebar current="income" />

      <div className="pd-work">
        <TopBar onBurger={() => {}} />
        <main className="pd-page">
          <div className="pd-pgh">
            <div>
              <h2>Мой доход</h2>
              <div className="sub">Все начисления с подписок ваших рефералов — L1 (прямые) и L2 (под‑партнёры). 10% от тарифа каждого активного реферала, lifetime.</div>
            </div>
          </div>

          <FiltersBar period={period} setPeriod={setPeriod}
                      level={level}   setLevel={setLevel}
                      status={status} setStatus={setStatus}
                      counts={counts} onCSV={downloadCSV} />

          <KpiRow totals={totals} />

          <BarsChart />

          <div style={{height: 18}}></div>

          <TransactionsTable rows={rows}
                             onSelect={setSelected}
                             selectedId={selected?.id}
                             sort={sort} setSort={setSort}
                             search={search} setSearch={setSearch}
                             page={page} setPage={setPage} />

          <CrmInfo />

          <div style={{marginTop: 8, fontSize: 11, color: "var(--fg-3)", lineHeight: 1.6, maxWidth: 720}}>
            Суммы указаны до удержания НДФЛ. Для партнёра без статуса
            самозанятого ИП Мальцев Валерий Валерьевич (ИНН 519041916737, Т‑Банк СПб) выступает
            налоговым агентом — удерживает и перечисляет НДФЛ по прогрессивной шкале
            с 01.01.2026 (13/15/18/20/22%). Выплаты — ежемесячно 1‑го числа,
            минимум 1 000 ₽, остаток переносится на следующий период.
          </div>
        </main>
      </div>

      <Drawer tx={selected} onClose={() => setSelected(null)} />

      <nav className="pd-bottomnav" aria-label="Мобильная навигация">
        {NAV_MAIN.slice(0, 5).map((it) => {
          const cls = `pd-bottomnav-item ${it.id === "income" ? "active" : ""}`;
          const body = <>
            <span className="ico"><Ic name={it.icon} size={22} /></span>
            <span>{it.label}</span>
          </>;
          return it.href
            ? <a key={it.id} className={cls} href={it.href} style={{textDecoration:"none"}}>{body}</a>
            : <button key={it.id} className={cls}>{body}</button>;
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
