   TAB 1 — Text templates
============================================================ */
function TextTemplates({ onToast }) {
  function copyText(t) {
    const body = t.text.replace(/\{ref\}/g, REF_LINK);
    try {
      navigator.clipboard.writeText(body);
      onToast(`Скопировано: «${t.title}»`);
    } catch (e) {
      onToast("Не удалось скопировать — попробуйте ещё раз");
    }
  }

  return (
    <div className="mt-posts">
      {POST_TEMPLATES.map((t) => {
        const preview = t.text.replace(/\{ref\}/g, "smmaibro.ru/?ref=ivan-petrov");
        return (
          <article key={t.id} className="mt-post">
            <div className="mt-post-h">
              <div>
                <h4>{t.title}</h4>
                <div className="mt-post-meta">
                  <span className="mt-post-len">{t.badge}</span>
                  <span className="mt-post-aud">{t.audience}</span>
                </div>
              </div>
              <button className="mt-post-copy" onClick={() => copyText(t)} aria-label={`Скопировать «${t.title}»`}>
                <Ic name="icon-action-copy" size={14} />
                <span>Скопировать с ссылкой</span>
              </button>
            </div>
            <pre className="mt-post-body">{preview}</pre>
            <div className="mt-post-foot">
              <span className="mt-post-tip">Переменная <code>{`{ref}`}</code> автоматически подставит вашу ссылку при копировании.</span>
            </div>
          </article>
        );
      })}
    </div>
  );
}

            </div>
          </div>
          <div className="mt-card-body">
            <h4>{v.title}</h4>
            <div className="mt-card-meta">
              <span className="mt-chip mt-chip-time">
                <Ic name="clock" size={11} />
                {v.duration}
              </span>
              <span className="mt-card-note">{v.note}</span>
            </div>
          </div>
          <div className="mt-card-foot mt-card-foot-3">
            <button className="mt-btn-secondary" onClick={() => onToast(`Открываем превью: ${v.title}`)}>
              <Ic name="icon-action-external-link" size={14} />
              <span>Превью</span>
            </button>
            <button className="mt-btn-ghost" onClick={() => onToast(`Скачиваем MP4: ${v.title}`)}>
              <Ic name="icon-action-download" size={14} />
              <span>MP4</span>
            </button>
            <button className="mt-btn-ghost" onClick={() => onToast("Embed-код скопирован")}>
              <Ic name="icon-action-copy" size={14} />
              <span>Embed</span>
            </button>
          </div>
        </article>
      ))}
    </div>
  );
}

/* ============================================================
   TAB 4 — Decks / Presentations
============================================================ */
function Decks({ onToast }) {
  return (
    <div className="mt-grid mt-grid-3">
      {DECKS.map((d) => (
        <article key={d.id} className={`mt-card mt-deck-card mt-tile-${d.tile}`}>
          <div className="mt-thumb mt-thumb-deck" aria-hidden="true">
            <div className="mt-thumb-slide mt-thumb-slide-1"></div>
            <div className="mt-thumb-slide mt-thumb-slide-2"></div>
            <div className="mt-thumb-slide mt-thumb-slide-3">
              <div className="mt-thumb-brand">
                <span>СММ</span>
                <span className="brand">АЙБРО</span>
              </div>
              <div className="mt-thumb-deck-num">{d.slides} слайдов</div>
            </div>
          </div>
          <div className="mt-card-body">
            <h4>{d.title}</h4>
            <div className="mt-card-meta">
              <span className="mt-chip mt-chip-slides">{d.slides} слайдов</span>
              <span className="mt-chip mt-chip-fmt">{d.formats}</span>
            </div>
            <p className="mt-card-note mt-card-note-block">{d.note}</p>
          </div>
          <div className="mt-card-foot">
            <button className="mt-btn-secondary" onClick={() => onToast(`Скачиваем PDF: ${d.title}`)}>
              <Ic name="icon-action-download" size={14} />
              <span>PDF</span>
            </button>
            <button className="mt-btn-ghost" onClick={() => onToast(`Скачиваем PPTX: ${d.title}`)}>
              <Ic name="icon-action-download" size={14} />
              <span>PPTX</span>
            </button>
          </div>
        </article>
      ))}
    </div>
  );
}

/* ============================================================
   TIPS BLOCK
============================================================ */
function TipsBlock() {
  return (
    <section className="mt-tips">
      <div className="mt-tips-h">
        <div className="mt-tips-ico"><Ic name="bolt" size={20} /></div>
        <div>
          <h3>Лучшие практики для роста рефералов</h3>
          <p className="mt-tips-sub">Что реально работает — основано на данных топ-20 партнёров СММ АЙБРО за последние 6 месяцев.</p>
        </div>
        <a className="mt-tips-cta" href="#help">
          <span>Открыть полный гайд</span>
          <Ic name="icon-action-external-link" size={14} />
        </a>
      </div>
      <ol className="mt-tips-list">
        {TIPS.map((t, i) => (
          <li key={i} className="mt-tip">
            <div className="mt-tip-num">{i + 1}</div>
            <div className="mt-tip-ico"><Ic name={t.ico} size={18} /></div>
            <div className="mt-tip-body">
              <h5>{t.title}</h5>
              <p>{t.body}</p>
            </div>
          </li>
        ))}
      </ol>
    </section>
  );
}

/* ============================================================
   TOAST (reuse ref-toast styling)
============================================================ */
function Toast({ msg }) {
  if (!msg) return null;
  return <div className="ref-toast">{msg}</div>;
}

/* ============================================================
   APP
============================================================ */
function App() {
  const [tab, setTab] = useState("posts");
  const [toast, setToast] = useState("");

  function fireToast(m) {
    setToast(m);
    setTimeout(() => setToast(""), 2200);
  }

  return (
    <div className="pd" data-screen-label="05 Партнёры — Материалы">
      <Sidebar current="materials" />

      <div className="pd-work">
        <TopBar onBurger={() => {}} />
        <main className="pd-page">
          <div className="pd-pgh">
            <div>
              <h2>Промо-материалы для партнёров</h2>
              <div className="sub">Готовые баннеры, тексты, видео и презентации для привлечения рефералов. Все материалы уже содержат вашу ссылку.</div>
            </div>
          </div>

          <ShareBlock onToast={fireToast} />

          <TabBar tab={tab} setTab={setTab} />

          <div className="mt-pane">
            {tab === "posts"   && <TextTemplates onToast={fireToast} />}
            {tab === "banners" && <Banners onToast={fireToast} />}
            {tab === "videos"  && <Videos onToast={fireToast} />}
            {tab === "decks"   && <Decks onToast={fireToast} />}
          </div>

          <TipsBlock />

          <div style={{marginTop: 8, fontSize: 11, color: "var(--fg-3)", lineHeight: 1.6, maxWidth: 720}}>
            Материалы обновляются автоматически — мы пересобираем баннеры и тексты под текущие условия (тариф, длительность пробного периода, актуальные кейсы). Если использовали материал в посте — можно не пересохранять, ссылка <code>{`{ref}`}</code> остаётся живой пожизненно.
          </div>
        </main>
      </div>

      <Toast msg={toast} />

      <nav className="pd-bottomnav" aria-label="Мобильная навигация">
        {NAV_MAIN.slice(0, 5).map((it) => {
          const cls = `pd-bottomnav-item ${it.id === "materials" ? "active" : ""}`;
          const body = <>
            <span className="ico"><Ic name={it.icon} size={22} /></span>
            <span>{it.label}</span>
          </>;
          return it.href
            ? <a key={it.id} className={cls} href={it.href} style={{textDecoration:"none"}}>{body}</a>
            : <button key={it.id} className={cls}>{body}</button>;
        })}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
