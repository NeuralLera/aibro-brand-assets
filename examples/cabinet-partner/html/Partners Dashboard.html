/* ============================================================
   INCOME CHART
============================================================ */
function IncomeChart({ period }) {
  const data = SERIES[period] || SERIES["Май"];
  const W = 720, H = 240, PAD_L = 48, PAD_R = 16, PAD_T = 18, PAD_B = 36;
  const max = Math.max(...data.map(d => d.v)) * 1.15;
  const min = 0;
  const yScale = (v) => PAD_T + (H - PAD_T - PAD_B) * (1 - (v - min) / (max - min));
  const xScale = (i) => PAD_L + (W - PAD_L - PAD_R) * (i / (data.length - 1));
  const pts = data.map((d, i) => [xScale(i), yScale(d.v)]);

  // Smooth path (catmull-rom-ish using cubic Bezier with mid-point control)
  const path = pts.reduce((p, [x, y], i, arr) => {
    if (i === 0) return `M ${x} ${y}`;
    const [px, py] = arr[i - 1];
    const cx = (px + x) / 2;
    return p + ` C ${cx} ${py}, ${cx} ${y}, ${x} ${y}`;
  }, "");

  const fillPath = path + ` L ${pts[pts.length - 1][0]} ${H - PAD_B} L ${pts[0][0]} ${H - PAD_B} Z`;

  // y-axis ticks (4)
  const ticks = [0, 1, 2, 3, 4].map(i => min + (max - min) * (i / 4));

  // hover state
  const [hover, setHover] = useState(null);
  const wrapRef = useRef(null);

  function onMove(e) {
    const rect = wrapRef.current.getBoundingClientRect();
    const xRatio = (e.clientX - rect.left) / rect.width;
    const idx = Math.round(xRatio * (data.length - 1));
    if (idx >= 0 && idx < data.length) {
      setHover({
        i: idx,
        x: (xScale(idx) / W) * 100, // %
        y: (yScale(data[idx].v) / H) * 100,
      });
    }
  }

  return (
    <div className="pd-card chart-card">
      <div className="pd-card-h">
        <h3>Динамика дохода</h3>
        <span className="meta">6 месяцев · сглаживание</span>
      </div>

      <div className="chart-summary">
        <div className="chart-sum-block">
          <div className="lbl">Доход · период</div>
          <div className="val">{fmtRub(data[data.length - 1].v)}</div>
        </div>
        <div className="chart-sum-block">
          <div className="lbl">Среднее за 6 мес</div>
          <div className="val dim">{fmtRub(Math.round(data.reduce((s, d) => s + d.v, 0) / data.length))}</div>
        </div>
        <div className="chart-legend">
          <span className="legend-swatch"><span className="swatch brand"></span>L1 + L2</span>
          <span className="legend-swatch"><span className="swatch muted"></span>средняя</span>
        </div>
      </div>

      <div className="chart-wrap" ref={wrapRef}
           onMouseMove={onMove}
           onMouseLeave={() => setHover(null)}>
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" role="img"
             aria-label="График дохода — 6 месяцев">
          <defs>
            <linearGradient id="chart-fill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stopColor="#10b981" stopOpacity="0.20" />
              <stop offset="1" stopColor="#10b981" stopOpacity="0" />
            </linearGradient>
          </defs>

          {/* horizontal grid */}
          {ticks.map((t, i) => (
            <g key={i}>
              <line x1={PAD_L} x2={W - PAD_R}
                    y1={yScale(t)} y2={yScale(t)}
                    stroke="rgba(15,23,42,0.06)" strokeDasharray={i === 0 ? "" : "3 4"} />
              <text x={PAD_L - 8} y={yScale(t) + 3}
                    textAnchor="end" fontSize="10"
                    fontFamily="JetBrains Mono, monospace"
                    fill="#6b7079"
                    style={{fontVariantNumeric: "tabular-nums"}}>
                {Math.round(t / 1000)}к ₽
              </text>
            </g>
          ))}

          {/* x labels */}
          {data.map((d, i) => (
            <text key={i} x={xScale(i)} y={H - PAD_B + 18}
                  textAnchor="middle" fontSize="11"
                  fontFamily="Golos Text, sans-serif"
                  fill="#6b7079">
              {d.m}
            </text>
          ))}

          {/* average dashed line */}
          {(() => {
            const avg = data.reduce((s, d) => s + d.v, 0) / data.length;
            const y = yScale(avg);
            return (
              <line x1={PAD_L} x2={W - PAD_R} y1={y} y2={y}
                    stroke="rgba(15,23,42,0.35)" strokeDasharray="4 4" />
            );
          })()}

          {/* fill */}
          <path d={fillPath} fill="url(#chart-fill)" />
          {/* line */}
          <path d={path} fill="none" stroke="#10b981" strokeWidth="2.2"
                strokeLinecap="round" strokeLinejoin="round" />

          {/* points */}
          {pts.map(([x, y], i) => (
            <g key={i}>
              <circle cx={x} cy={y} r="4.5" fill="#ffffff" stroke="#10b981" strokeWidth="2" />
              {hover && hover.i === i &&
                <circle cx={x} cy={y} r="8" fill="rgba(16,185,129,0.18)" />
              }
            </g>
          ))}

          {/* vertical hover guide */}
          {hover && (
            <line x1={xScale(hover.i)} x2={xScale(hover.i)}
                  y1={PAD_T} y2={H - PAD_B}
                  stroke="rgba(16,185,129,0.30)" />
          )}
        </svg>

        {hover && (
          <div className="chart-tooltip show"
               style={{ left: `${hover.x}%`, top: `${hover.y}%` }}>
            <div className="v">{fmtRub(data[hover.i].v)}</div>
            <div className="m">{data[hover.i].m}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// Deterministic-looking QR placeholder (21×21 modules, with finder squares)
function QrSvg() {
  const N = 21;
  // Generate a stable pseudo-random matrix
  const seed = 137;
  const m = [];
  let s = seed;
  for (let y = 0; y < N; y++) {
    m[y] = [];
    for (let x = 0; x < N; x++) {
      s = (s * 9301 + 49297) % 233280;
      m[y][x] = s / 233280 > 0.52 ? 1 : 0;
    }
  }
  // Finder squares (7x7) at top-left, top-right, bottom-left
  const setFinder = (ox, oy) => {
    for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
      const isBorder = x === 0 || x === 6 || y === 0 || y === 6;
      const isInner = x >= 2 && x <= 4 && y >= 2 && y <= 4;
      m[oy + y][ox + x] = (isBorder || isInner) ? 1 : 0;
    }
    // separator row/col
    for (let i = -1; i <= 7; i++) {
      if (oy - 1 >= 0 && ox + i >= 0 && ox + i < N) m[oy - 1][ox + i] = 0;
      if (oy + 7 < N && ox + i >= 0 && ox + i < N) m[oy + 7][ox + i] = 0;
      if (ox - 1 >= 0 && oy + i >= 0 && oy + i < N) m[oy + i] && (m[oy + i][ox - 1] = 0);
      if (ox + 7 < N && oy + i >= 0 && oy + i < N) m[oy + i] && (m[oy + i][ox + 7] = 0);
    }
  };
  setFinder(0, 0);
  setFinder(N - 7, 0);
  setFinder(0, N - 7);
  // Clear center for logo (5x5)
  const cs = Math.floor(N / 2) - 2;
  for (let y = cs; y < cs + 5; y++) for (let x = cs; x < cs + 5; x++) m[y][x] = 0;

  const size = 21;
  const rects = [];
  for (let y = 0; y < N; y++) for (let x = 0; x < N; x++) {
    if (m[y][x]) rects.push(<rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill="#0e0f12" />);
  }
  return (
    <svg viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges" aria-hidden="true">
      {rects}
    </svg>
  );
}

            <span className="max-glyph"><img src="design/assets/logos/max-glyph.svg" alt="" style={{width:"100%",height:"100%",display:"block"}} /></span>
            Поделиться в MAX
          </button>
          <button className="share-btn">
            <Ic name="icon-action-share-link" size={14} />
            UTM‑конструктор
          </button>
          <button className="share-btn">
            <Ic name="icon-action-download" size={14} />
            Скачать QR (PNG)

          <QrSvg />

        </div>
        <div className="qr-caption">QR · ref=ivan‑petrov</div>

/* ============================================================
   ACTIVITY
============================================================ */
function ActivityCard() {
  const map = {
    new:     { tone: "brand",   icon: "icon-status-new" },
    accrued: { tone: "amber",   icon: "price-tag-ruble" },
    payout:  { tone: "success", icon: "shield-check" },
    tier:    { tone: "blue",    icon: "icon-status-info" },
  };
  return (
    <div className="pd-card">
      <div className="pd-card-h">
        <h3>Последние события</h3>
        <a className="more" href="#log">Журнал →</a>
      </div>
      <div className="activity">
        {ACTIVITY.map((a, i) => {
          const cfg = map[a.kind];
          return (
            <div className="activity-row" key={i}>
              <div className={`activity-ico ${cfg.tone}`}><Ic name={cfg.icon} size={18} /></div>
              <div className="activity-body">
                <div className="activity-title">
                  {a.title}{" "}
                  {a.amt && <span className={`activity-amt ${a.amt.startsWith("−") ? "neg" : ""}`}>{a.amt.replace("+","+\u00A0").replace(/(\d) /g,"$1\u00A0")}</span>}
                </div>
                <div className="activity-meta" style={{fontSize: 12, color: "var(--fg-3)", fontFamily:"var(--font-body)", letterSpacing:0, textTransform:"none"}}>{a.meta}</div>
              </div>
              <div className="activity-meta">{a.d} · {a.t}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
   BOTTOM NAV (mobile) + DRAWER
============================================================ */
function BottomNav({ active, onNavigate }) {
  const items = NAV_MAIN.slice(0, 5);
  return (
    <nav className="pd-bottomnav" aria-label="Мобильная навигация">
      {items.map((it) => {
        const cls = `pd-bottomnav-item ${active === it.id ? "active" : ""}`;
        const body = <>
          <span className="ico"><Ic name={it.icon} size={22} /></span>
          <span>{it.label}</span>
        </>;
        return it.href
          ? <a key={it.id} className={cls} href={it.href} style={{textDecoration:"none"}}>{body}</a>
          : <button key={it.id} className={cls} onClick={() => onNavigate(it.id)}>{body}</button>;
      })}
    </nav>
  );
}

function Drawer({ open, onClose, active, onNavigate }) {
  return (
    <>
      <div className={`pd-drawer-bg ${open ? "open" : ""}`} onClick={onClose}></div>
      <aside className={`pd-drawer ${open ? "open" : ""}`}>
        <a className="pd-brand" href="#">
          <span className="pd-brand-tile"><img src="design/assets/logos/robot-icon-light.svg" alt="" /></span>
          <span>
            <span className="pd-brand-word">СММ <span style={{color:"var(--brand-700)"}}>АЙБРО</span></span>
            <div className="pd-brand-meta">Партнёры</div>
          </span>
        </a>
        <div className="pd-biz">
          <div className="pd-biz-ava">И</div>
          <div>
            <div className="pd-biz-name">Иван Петров</div>
            <div className="pd-biz-handle">@ivan‑petrov · ФЛ</div>
          </div>
          <div className="pd-biz-pill">L2</div>
        </div>
        {NAV_MAIN.map((it) => {
          const cls = `pd-nav-item ${active === it.id ? "active" : ""}`;
          const body = <>
            <span className="ico"><Ic name={it.icon} size={20} /></span>
            <span>{it.label}</span>
            {it.badge ? <span className="badge">{it.badge}</span> : null}
          </>;
          return it.href
            ? <a key={it.id} className={cls} href={it.href}>{body}</a>
            : <button key={it.id} className={cls} onClick={() => { onNavigate(it.id); onClose(); }}>{body}</button>;
        })}
        <div className="pd-nav-caption">Аккаунт</div>
        {NAV_FOOT.map((it) => (
          <button key={it.id}
            className={`pd-nav-item ${active === it.id ? "active" : ""}`}
            onClick={() => { onNavigate(it.id); onClose(); }}>
            <span className="ico"><Ic name={it.icon} size={20} /></span>
            <span>{it.label}</span>
          </button>
        ))}
        <div className="pd-side-foot">
          ИП Мальцев · 4 990 ₽/мес<br/>
          <a href="#terms">Правила программы</a>
        </div>
      </aside>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
