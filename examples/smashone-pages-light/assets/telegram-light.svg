<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Telegram Messenger">
  <defs>
    <linearGradient id="lb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f7f3"></stop>
      <stop offset="0.55" stop-color="#ecebe7"></stop>
      <stop offset="1" stop-color="#fbfbf8"></stop>
    </linearGradient>
    <pattern id="lgrain" width="3" height="2" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#d8d8d3" fill-opacity="0.28"></rect>
      <rect y="1" width="3" height="1" fill="#fff" fill-opacity="0.35"></rect>
    </pattern>
    <radialGradient id="lw" cx="0.85" cy="0.15" r="0.75">
      <stop offset="0" stop-color="#c9a646" stop-opacity="0.08"></stop>
      <stop offset="0.55" stop-color="#c9a646" stop-opacity="0.02"></stop>
      <stop offset="1" stop-color="#fff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="lte" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.85"></stop>
      <stop offset="0.08" stop-color="#fff" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="lig" cx="0.78" cy="0.22" r="0.55">
      <stop offset="0" stop-color="#fff" stop-opacity="0.45"></stop>
      <stop offset="1" stop-color="#fff" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="lbs" x1="0" y1="0.7" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#000" stop-opacity="0.06"></stop>
    </linearGradient>
    <clipPath id="lcl"><rect x="0" y="0" width="64" height="64" rx="14" ry="14"></rect></clipPath>
  
    <filter id="telegramSoftShadow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.18"></feDropShadow>
    </filter>
    <linearGradient id="telegramLogoSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a2a" stop-opacity="0.18"></stop>
      <stop offset="0.48" stop-color="#2a2a2a" stop-opacity="0"></stop>
      <stop offset="1" stop-color="#000000" stop-opacity="0.07"></stop>
    </linearGradient>
  </defs>
  <g clip-path="url(#lcl)">
    <rect width="64" height="64" fill="#ececec"></rect>
    <rect width="64" height="64" fill="url(#lb)"></rect>
    <rect width="64" height="64" fill="url(#lgrain)" opacity="0.75"></rect>
    <rect width="64" height="64" fill="url(#lw)"></rect>
    <rect width="64" height="64" fill="url(#lig)"></rect>
    <rect width="64" height="64" fill="url(#lbs)"></rect>
    <rect width="64" height="64" fill="url(#lte)"></rect>
  </g>
  <rect x="0.6" y="0.6" width="62.8" height="62.8" rx="13.4" ry="13.4" fill="none" stroke="#2a2a2a" stroke-opacity="0.22" stroke-width="1.2"></rect>

  
