/* ============================================================

============================================================ */
function ToastStack({ toasts, onClose }) {
  return (
    <div className="uk-toast-stack" aria-live="polite">
      {toasts.map(t => (
        <ToastView key={t.id} t={t} onClose={() => onClose(t.id)} />
      ))}
    </div>
  );
}

function ToastView({ t, onClose }) {
  return (
    <div className={`uk-toast uk-toast--${t.kind}`} role="status">
      <div className="uk-toast-icon">
        <Ic name={t.icon} size={18} />
      </div>
      <div className="uk-toast-body">
        <div className="uk-toast-title">{t.title}</div>
        <p className="uk-toast-text">{t.text}</p>
        {t.cta && (
          <div className="uk-toast-action">
            <button className="uk-btn uk-btn--ghost uk-btn--sm">{t.cta} →</button>
          </div>
        )}
      </div>
      <button className="uk-toast-close" onClick={onClose} aria-label="Закрыть">×</button>
    </div>
  );
}

/* ============================================================
   MODAL LIVE OVERLAY
============================================================ */
function ModalOverlay({ children, onClose }) {
  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, []);
  return (
    <div className="uk-modal-overlay" onClick={onClose}>
      <div className="uk-modal" onClick={e => e.stopPropagation()} role="dialog" aria-modal="true">
        {children}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
============================================================ */
function App() {
  const [toasts, setToasts] = useState([]);
  const [activeModal, setActiveModal] = useState(null);
  const counter = useRef(0);

  function fireToast(template) {
    const id = ++counter.current;
    setToasts(prev => [...prev, { ...template, id }]);
    if (template.kind === "success" || template.kind === "info") {
      setTimeout(() => closeToast(id), 5000);
    }
  }
  function closeToast(id) {
    setToasts(prev => prev.filter(t => t.id !== id));
  }

  const modal = MODAL_CATALOG.find(m => m.id === activeModal);

  return (
    <div className="uk-shell">
      <div className="uk-wrap">
        <header className="uk-head">
          <div>
            <div className="uk-head-meta" style={{marginBottom: 8}}>
              <span>Кабинет / UI Kit</span>
              <span>·</span>
              <span>v1.0</span>
              <span>·</span>
              <span>обновлено 16.05.2026</span>
            </div>
            <h1>UI Kit · Modals, Empty states, Toasts</h1>
            <p className="lead">
              Gallery всех reusable UI patterns для cabinet.smmaibro.ru / admin.smmaibro.ru / partners.smmaibro.ru.
              Используется codex для Phase 4 TSX implementation и Валерием для дизайн-ревью всех edge cases.
            </p>
          </div>
          <div className="uk-head-meta">
            <span className="uk-head-tag">Aibro · 27 паттернов</span>
          </div>
        </header>

        <Toc />

        <Section id="toasts" num="01" title="Toasts / Notifications" desc="Всплывающие уведомления · 4 семантических состояния + feature" count={5}>
          <ToastsSection onFire={fireToast} />
        </Section>

        <Section id="modals" num="02" title="Modals" desc="Confirm / form / drag-drop · все вызывают overlay с blur и Esc-handler" count={6}>
          <ModalsSection onOpen={setActiveModal} />
        </Section>

        <Section id="empty" num="03" title="Empty states" desc="Для всех пустых страниц кабинета · иллюстрация + CTA или ссылка" count={8}>
          <EmptySection />
        </Section>

        <Section id="banners" num="04" title="Banners / Callouts" desc="Full-width баннеры на странице · brand / warn / danger / info / feature" count={5}>
          <BannersSection />
        </Section>

        <Section id="loading" num="05" title="Loading / Skeletons" desc="Async загрузка · shimmer animation 1400ms линейная" count={3}>
          <SkeletonsSection />
        </Section>

        <footer style={{marginTop: 80, paddingTop: 24, borderTop: "1px solid var(--border-1)",
                        fontSize: 12, color: "var(--fg-3)", display: "flex",
                        justifyContent: "space-between", flexWrap: "wrap", gap: 12}}>
          <div>СММ АЙБРО · UI Kit gallery · single-MAX · 4 990 ₽/мес · 168-ФЗ compliant</div>
          <div>RUMIRA · Claude Opus 4.7 · TASK-007 · 16.05.2026</div>
        </footer>
      </div>

      <ToastStack toasts={toasts} onClose={closeToast} />

      {modal && (
        <ModalOverlay onClose={() => setActiveModal(null)}>
          {modal.render(() => setActiveModal(null))}
        </ModalOverlay>
      )}
    </div>
  );
}
