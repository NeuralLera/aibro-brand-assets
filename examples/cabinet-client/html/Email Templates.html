<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const ICO = "design/assets/icons/";
const LOGO = "design/assets/logos/";

function Ic({ name, size = 18, style }) {
  return (
    <img src={`${ICO}${name}.svg`} alt="" aria-hidden="true"
         style={{ width: size, height: size, display: "block", ...style }} />
  );
}

/* ============================================================
   TOC nav
============================================================ */
const SECTIONS = [
  { id: "welcome",  num: "01", title: "Welcome",                   desc: "После регистрации · приветствие + 3-step roadmap" },
  { id: "trial-x",  num: "02", title: "Завтра закончится пробный", desc: "T-1 до конца пробного периода · функции которые потеряются" },
  { id: "trial-e",  num: "03", title: "Пробный закончился",        desc: "T+0 · мягкое сообщение + опция «скачать данные»" },
  { id: "receipt",  num: "04", title: "Чек об оплате",             desc: "После успешной оплаты · 54-ФЗ compliance" },

  { id: "payout",   num: "06", title: "Партнёрская выплата",       desc: "Партнёрам · сумма + breakdown НДФЛ + 2-НДФЛ" },
  { id: "ref-new",  num: "07", title: "Новый реферал",             desc: "Партнёру когда L1/L2 зарегистрировался" },
  { id: "renewed",  num: "08", title: "Подписка продлена",         desc: "После успешного auto-billing · подтверждение" },
];

function Toc() {
  return (
    <nav className="uk-toc" aria-label="Разделы Email templates">
      {SECTIONS.map(s => (
        <a key={s.id} href={`#${s.id}`}>
          <span className="uk-toc-num">{s.num}</span>
          <span>{s.title}</span>
        </a>
      ))}
    </nav>
  );
}

function Section({ id, num, title, desc, children }) {
  const [open, setOpen] = useState(true);
  return (
    <section id={id} className={`uk-section ${open ? "" : "collapsed"}`}>
      <div className={`uk-section-head ${open ? "" : "collapsed"}`} onClick={() => setOpen(!open)}>
        <div>
          <h2><span className="num">{num}</span> {title}</h2>
          <p className="desc">{desc}</p>
        </div>
        <button className="uk-section-toggle" aria-label={open ? "Свернуть" : "Развернуть"}>
          <Ic name="icon-action-expand" size={14} />
        </button>
      </div>
      {open && <div className="uk-section-body">{children}</div>}
    </section>
  );
}

/* ============================================================
   EMAIL WINDOW (chrome + meta-block + body)
============================================================ */
function EmailWindow({ from, to, subject, tag = "transactional", children, plaintext }) {
  const [showText, setShowText] = useState(false);
  return (
    <div className="em-window">
      <div className="em-chrome">
        <span className="em-chrome-dot" />
        <span className="em-chrome-dot" />
        <span className="em-chrome-dot" />
        <span className="em-chrome-title">Mail · preview · {tag}</span>
      </div>
      <div className="em-meta-block">
        <div className="em-meta-row">
          <span className="label">от</span>
          <span className="value">{from}</span>
        </div>
        <div className="em-meta-row">
          <span className="label">кому</span>
          <span className="value">{to}</span>
        </div>
        <div className="em-subject">{subject}</div>
      </div>
      <div className="em-body">
        {children}
      </div>

      <div className="em-actions-row" style={{padding: "0 18px 14px"}}>
        <a href="#" onClick={e => e.preventDefault()}
           style={{fontSize: 12, color: "var(--brand-700)", fontWeight: 600}}>
          Открыть полный preview →
        </a>
        <button className="uk-btn uk-btn--ghost uk-btn--sm" onClick={() => setShowText(s => !s)}>
          <Ic name="file-text" size={12} /> {showText ? "Скрыть" : "Показать"} plain-text
        </button>
      </div>
      {showText && (
        <div style={{padding: "0 18px 18px"}}>
          <pre className="em-plaintext">{plaintext}</pre>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   Reusable: branded card header / footer
============================================================ */
function EmHeader({ kind = "", tag = "" }) {

    <div className={`em-header ${kind ? "em-header--" + kind : ""}`}>

      </div>
      <span className="em-header-brand">СММ АЙБРО</span>
      {tag && <span className="em-header-tag">{tag}</span>}
    </div>
  );
}

function EmFooter({ extra }) {

  );
}
