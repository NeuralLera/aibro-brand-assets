<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>СММ АЙБРО · Сброс пароля</title>
  <link rel="icon" type="image/svg+xml" href="design/assets/logos/robot-icon-light.svg">
  <link rel="stylesheet" href="design/tokens.css">
  <link rel="stylesheet" href="design/auth.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>body { margin: 0; }</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;
const ICO = "design/assets/icons/";

function Ic({ name, size = 18, style }) {
  return <img src={`${ICO}${name}.svg`} alt="" aria-hidden="true"
              style={{ width: size, height: size, display: "block", ...style }} />;
}

function TopNav() {
  return (
    <header className="au-top">
      <a className="au-brand" href="/">
        <span className="au-brand-tile">
          <img src="design/assets/logos/robot-icon-light.svg" alt="" />
        </span>
        <span className="au-brand-word">СММ <em>АЙБРО</em></span>
      </a>
      <div className="au-top-actions">
        <a className="au-top-link brand" href="Login.html">← Вернуться к входу</a>
      </div>
    </header>
  );
}

function pwdStrength(pwd) {
  if (!pwd) return 0;
  let s = 0;
  if (pwd.length >= 8) s++;
  if (/[A-ZА-Я]/.test(pwd)) s++;
  if (/\d/.test(pwd)) s++;
  if (/[^A-Za-zА-Я0-9]/.test(pwd)) s++;
  return Math.min(s, 3);
}

/* STEP 1 — request email */
function StepRequest({ onNext }) {
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);

  function submit(e) {
    e.preventDefault();
    if (email) setSent(true);
  }

  return (
    <>
      <div className="au-head">
        <h1>Сброс пароля</h1>
        <p>Введите email, который указали при регистрации. Мы пришлём ссылку для создания нового пароля.</p>
      </div>

      {!sent ? (
        <form className="au-form" onSubmit={submit}>
          <div className="au-field">
            <label className="au-field-label">Email</label>
            <input type="email" className="au-input" placeholder="anna@pekarnya-uyut.ru"
                   value={email} onChange={(e) => setEmail(e.target.value)} required />
          </div>

          <button type="submit" className="au-btn au-btn-primary">
            Отправить ссылку для сброса
          </button>

          <div className="au-callout">
            <Ic name="icon-status-info" size={16} />
            <div>
              Ссылка придёт на email <b>в течение 1 минуты</b>. Если не пришла — проверьте «Спам» или попробуйте через 5 минут.
            </div>
          </div>

          <div className="au-foot">
            Вспомнили пароль? <a href="Login.html">Вернуться к входу →</a>
          </div>
        </form>
      ) : (
        <div className="au-form">
          <div className="au-callout au-callout-success">
            <Ic name="icon-status-success" size={18} />
            <div>
              <b>Ссылка отправлена на {email}</b><br/>
              Откройте письмо и нажмите на ссылку «Сбросить пароль». Действует 30 минут.
            </div>
          </div>

          <button type="button" className="au-btn au-btn-secondary" onClick={() => setSent(false)}>
            Отправить ещё раз
          </button>

          <button type="button" className="au-btn au-btn-ghost" onClick={onNext}>
            Я открыл письмо — перейти к шагу 2 (демо) →
          </button>

          <div className="au-foot">
            Письмо не пришло? <a href="mailto:support@smmaibro.ru">support@smmaibro.ru</a>
          </div>
        </div>
      )}
    </>
  );
}

/* STEP 2 — new password */
function StepNewPassword() {
  const [pwd, setPwd] = useState("");
  const [repeat, setRepeat] = useState("");
  const [showPwd, setShowPwd] = useState(false);

  const strength = useMemo(() => pwdStrength(pwd), [pwd]);
  const strengthClass = strength === 0 ? "" : strength === 1 ? "active-weak" : strength === 2 ? "active-medium" : "active-strong";
  const strengthLabel = strength === 0 ? "Введите пароль" : strength === 1 ? "Слабый" : strength === 2 ? "Средний" : "Надёжный";

  const canSubmit = pwd && pwd === repeat && strength >= 2;

  function submit(e) {
    e.preventDefault();
    alert("Пароль обновлён · переход в кабинет");
    window.location.href = "Dashboard.html";
  }

  return (
    <>
      <div className="au-head">
        <h1>Новый пароль</h1>
        <p>Придумайте новый пароль для входа. Старый перестанет работать после сохранения.</p>
      </div>

      <form className="au-form" onSubmit={submit}>
        <div className="au-field">
          <label className="au-field-label">Новый пароль</label>
          <div className="au-input-wrap">
            <input type={showPwd ? "text" : "password"} className="au-input" placeholder="Минимум 8 символов"
                   value={pwd} onChange={(e) => setPwd(e.target.value)} required autoFocus />
            <button type="button" className="au-input-toggle" onClick={() => setShowPwd(!showPwd)}>
              {showPwd ? "Скрыть" : "Показать"}
            </button>
          </div>
          {pwd && (
            <>
              <div className="au-pwd-strength">
                <div className={`au-pwd-strength-bar ${strength >= 1 ? strengthClass : ""}`}></div>
                <div className={`au-pwd-strength-bar ${strength >= 2 ? strengthClass : ""}`}></div>
                <div className={`au-pwd-strength-bar ${strength >= 3 ? strengthClass : ""}`}></div>
              </div>
              <span className="au-pwd-hint">{strengthLabel} · минимум 8 символов · хотя бы 1 цифра и 1 буква</span>
            </>
          )}
        </div>

        <div className="au-field">
          <label className="au-field-label">Повторите пароль</label>
          <input type="password" className="au-input" placeholder="Тот же пароль"
                 value={repeat} onChange={(e) => setRepeat(e.target.value)} required />
          {repeat && pwd !== repeat && (
            <span className="au-pwd-hint" style={{color: "#ef4444"}}>Пароли не совпадают</span>
          )}
        </div>

        <button type="submit" className="au-btn au-btn-primary" disabled={!canSubmit}>
          <Ic name="shield-check" size={18} style={{filter:"brightness(0) invert(1)"}} />
          Установить пароль и войти
        </button>

        <div className="au-callout">
          <Ic name="icon-status-info" size={16} />
          <div>
            <b>Все другие сессии будут завершены.</b><br/>
            После смены пароля придётся войти заново на телефоне и других устройствах.
          </div>
        </div>
      </form>

      <div className="au-foot">
        <a href="Login.html">← Вернуться к входу</a>
      </div>
    </>
  );
}

function App() {
  const [step, setStep] = useState(1);

  return (
    <div className="au-shell">
      <TopNav />
      <main className="au-main au-main--single">
        <div className="au-card">
          {step === 1 ? <StepRequest onNext={() => setStep(2)} /> : <StepNewPassword />}
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
