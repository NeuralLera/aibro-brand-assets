/* =====================================================================
   Icon registry — fetches SVG text, strips width/height for currentColor.
   ===================================================================== */
const { useState, useEffect, useMemo, useRef } = React;
const ICON_CACHE = new Map();

function loadIcon(path) {
  if (ICON_CACHE.has(path)) return ICON_CACHE.get(path);
  const p = fetch(path)
    .then((r) => (r.ok ? r.text() : ""))
    .then((txt) => {
      const clean = txt
        .replace(/<\?xml[^>]*\?>/, "")
        .replace(/<!--[\s\S]*?-->/g, "")
        .replace(/(<svg[^>]*?)\swidth="[^"]*"/, "$1")
        .replace(/(<svg[^>]*?)\sheight="[^"]*"/, "$1");
      ICON_CACHE.set(path, clean);
      return clean;
    });
  ICON_CACHE.set(path, p);
  return p;
}
function SvgIcon({ path, size = 20, style, className }) {
  const [html, setHtml] = useState(() => {
    const v = ICON_CACHE.get(path);
    return typeof v === "string" ? v : "";
  });
  useEffect(() => {
    let alive = true;
    Promise.resolve(loadIcon(path)).then((txt) => { if (alive) setHtml(txt); });
    return () => { alive = false; };
  }, [path]);
  const s = typeof size === "number" ? `${size}px` : size;
  return (
    <span
      className={className}
      aria-hidden="true"
      style={{ display: "inline-flex", width: s, height: s, flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: html }}
    />
  );
}
function Ico({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/${name}.svg`} size={size} style={style} className={className} />;
}
function IcoCore({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/ui-core/${name}.svg`} size={size} style={style} className={className} />;
}

const TILE_PALETTES = [

  ["#fde2e4", "#dc2626", "#7f1d1d"], // berry
  ["#f1e0c5", "#a16207", "#451a03"], // caramel

  ["#fff1f2", "#f43f5e", "#881337"], // red
  ["#f7fee7", "#65a30d", "#365314"], // olive

function MockImage({ seed, label }) {
  const p = TILE_PALETTES[seed % TILE_PALETTES.length];
  // Simple decorative composition — circle + arc + label initial. Pure SVG, scales with container.
  const initial = (label || "?").trim().charAt(0).toUpperCase();
  const gradId = `g${seed}`;
  return (
    <svg className="pr-mock-img" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%"  stopColor={p[0]} />
          <stop offset="100%" stopColor={p[1]} stopOpacity="0.42" />
        </linearGradient>
      </defs>
      <rect width="400" height="300" fill={`url(#${gradId})`} />
      <circle cx="320" cy="80"  r="80"  fill={p[1]} fillOpacity="0.20" />
      <circle cx="80"  cy="240" r="100" fill={p[1]} fillOpacity="0.12" />
      <path d="M 0 220 Q 100 160 200 200 T 400 180 L 400 300 L 0 300 Z" fill={p[1]} fillOpacity="0.22" />
      <text x="36" y="248" fill={p[2]} fontFamily="Onest, sans-serif" fontWeight="800" fontSize="120" letterSpacing="-4">{initial}</text>
    </svg>
  );
}

      <div className="pr-select">
        <select value={status} onChange={(e) => setStatus(e.target.value)} aria-label="Статус">
          {STATUS_OPTIONS.map((s) => (
            <option key={s.id} value={s.id}>{s.label}</option>
          ))}
        </select>
      </div>

      <div className="pr-select">
        <select value={sort} onChange={(e) => setSort(e.target.value)} aria-label="Сортировка">
          {SORT_OPTIONS.map((o) => (
            <option key={o.id} value={o.id}>{o.label}</option>

      </div>

      <div className="pr-tools-actions">
        <button type="button" className="cab-btn cab-btn--sm cab-btn--ghost" onClick={onBulk}>
          <Ico name="icon-action-edit" size={14} />

        </button>
        <button type="button" className="cab-btn cab-btn--sm cab-btn--secondary" onClick={onImport}>
          <Ico name="icon-action-import" size={14} />

        </button>

          <Ico name="icon-action-add" size={14} />
          Добавить
        </button>
      </div>
    </div>
  );
}

/* =====================================================================
   Product card (grid)
   ===================================================================== */
function ProductCard({ p, idx, onEdit, onToggleHide }) {
  const chipNode = (chip) => {
    if (chip === "ok")     return <span key={chip} className="pr-chip pr-chip--ok">В наличии</span>;
    if (chip === "hidden") return <span key={chip} className="pr-chip pr-chip--hidden">Скрыт</span>;
    if (chip === "soon")   return <span key={chip} className="pr-chip pr-chip--soon">Скоро</span>;
    if (chip === "new")    return <span key={chip} className="pr-chip pr-chip--new">Новинка</span>;
    if (chip === "out")    return <span key={chip} className="pr-chip pr-chip--hidden">Нет в наличии</span>;
    return null;
  };
  const stockCls = p.stock === 0 ? "out" : p.stock < 5 ? "warn" : "";
  const stockText = p.stock === 0
    ? "Нет в наличии"
    : `${p.stock} ${p.unit}`;
  return (
    <article className={`pr-card ${p.hidden ? "is-hidden" : ""}`}>
      <div className="pr-card-img">
        <MockImage seed={idx} label={p.title} />
        <div className="pr-card-chips">
          {p.chips.map((c) => chipNode(c))}
          {p.ai && <span className="pr-chip pr-chip--ai">ИИ ✓</span>}
        </div>
        <div className="pr-card-actions">
          <button type="button" aria-label="Редактировать" onClick={() => onEdit(p)}>
            <Ico name="icon-action-edit" size={14} />
          </button>
          <button type="button" aria-label={p.hidden ? "Показать" : "Скрыть"} onClick={() => onToggleHide(p)}>
            <Ico name="icon-action-archive" size={14} />
          </button>
          <button type="button" className="danger" aria-label="Удалить">
            <Ico name="icon-action-delete" size={14} />
          </button>
        </div>
      </div>
      <div className="pr-card-body">
        <span className="pr-card-cat">{p.catLabel}</span>
        <h3 className="pr-card-title">{p.title}</h3>
        <p className="pr-card-desc">{p.desc}</p>
        <div className="pr-card-foot">
          <div className="pr-card-price">
            <span className="amt">{fmtRub(p.price)}</span>
            {p.oldPrice && <span className="old">{fmtRub(p.oldPrice)}</span>}
          </div>
          <span className={`pr-card-stock ${stockCls}`}>
            <span className="dot"></span>
            {stockText}
          </span>
        </div>
      </div>
    </article>
  );
}

                  <input type="checkbox" defaultChecked />
                  <span className="box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12l4 4L19 6" />
                    </svg>
                  </span>
                  <span>Доступен самовывоз</span>
                </label>
              </div>
            )}

            {section === "seo" && (
              <React.Fragment>
                <div className="pr-modal-section">
                  <h4>Поведение в боте</h4>
                  <div className="pr-field">
                    <label>Ключевые слова (через запятую)</label>
                    <input type="text" defaultValue="медовик, торт медовый, медовый торт, к чаю" />
                    <span className="help">ИИ будет предлагать товар, когда клиент пишет похожие слова.</span>
                  </div>
                </div>
                <div className="pr-modal-section">
                  <h4>SEO для каталога</h4>
                  <div className="pr-field">
                    <label>Title</label>
                    <input type="text" defaultValue={isNew ? "" : `${product.title} — Пекарня «Уют»`} />
                  </div>
                  <div className="pr-field">
                    <label>Description</label>
                    <textarea defaultValue={isNew ? "" : `${product.desc} Доставка по СПб. Цена ${fmtRub(product.price)}.`}></textarea>
                  </div>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>

        <div className="pr-modal-foot">
          <div className="left">
            <span className="dot"></span>
            Авто‑сохранение черновика · последнее обновление только что
          </div>
          <div className="right">
            <button type="button" className="cab-btn cab-btn--sm cab-btn--ghost" onClick={onClose}>Отмена</button>
            <button type="button" className="cab-btn cab-btn--sm cab-btn--secondary">Сохранить как черновик</button>
            <button type="button" className="cab-btn cab-btn--sm cab-btn--primary">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
                <path d="M5 12l4 4L19 6" />
              </svg>
              {isNew ? "Опубликовать" : "Сохранить"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* =====================================================================
   Bulk-selection mock bar
   ===================================================================== */
function BulkBar({ visible, onClose }) {
  if (!visible) return null;
  return (
    <div className="pr-bulk" role="status" aria-live="polite">
      <span className="count">
        3 выбрано
        <small>из 124 товаров</small>
      </span>
      <div className="pr-bulk-actions">
        <button type="button" className="b"><Ico name="icon-action-edit" size={12} /> Изменить</button>
        <button type="button" className="b"><Ico name="tag" size={12} /> Цена</button>
        <button type="button" className="b"><Ico name="icon-action-archive" size={12} /> Скрыть</button>
        <button type="button" className="b"><Ico name="icon-action-export" size={12} /> Экспорт CSV</button>
        <button type="button" className="b danger"><Ico name="icon-action-delete" size={12} /> Удалить</button>
        <button type="button" className="b" onClick={onClose}>
          <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
            <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
          </svg>
          Сбросить
        </button>
      </div>
    </div>
  );
}

/* =====================================================================
   App root
   ===================================================================== */
function ProductsApp() {
  const [tab, setTab] = useState("products");
  const [query, setQuery] = useState("");
  const [cat, setCat] = useState("all");
  const [status, setStatus] = useState("all");
  const [sort, setSort] = useState("popular");
  const [edit, setEdit] = useState(null);
  const [importOpen, setImportOpen] = useState(true);
  const [bulkOn, setBulkOn] = useState(false);
  const [services, setServices] = useState(SERVICES);

  const filteredProducts = useMemo(() => {
    let list = PRODUCTS.slice();
    if (cat !== "all") list = list.filter((p) => p.cat === cat);
    if (status !== "all") list = list.filter((p) => p.status === status);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      list = list.filter((p) => `${p.title} ${p.id} ${p.catLabel}`.toLowerCase().includes(q));
    }
    if (sort === "name") list.sort((a, b) => a.title.localeCompare(b.title, "ru"));
    if (sort === "price-asc")  list.sort((a, b) => a.price - b.price);
    if (sort === "price-desc") list.sort((a, b) => b.price - a.price);
    return list;
  }, [query, cat, status, sort]);

  const handleEdit = (p) => setEdit(p || { id: "__new__", title: "Новый товар", cat: "cakes", catLabel: "Торты на заказ", price: 0, oldPrice: null, status: "active", stock: 0, unit: "шт", chips: ["ok"], desc: "", ai: false });
  const handleToggleHide = (p) => alert(`«${p.title}» — заглушка переключения статуса`);
  const handleToggleService = (s) => {
    setServices((prev) => prev.map((x) => x.id === s.id ? { ...x, booking: !x.booking } : x));
  };

  const business = { ava: "У", name: "Пекарня «Уют»", handle: "@pekarnya_uyut" };

  return (
    <div className="dash" data-screen-label="05 Cabinet — Товары и услуги">
      <Sidebar current="products" business={business} />
      <div className="work">
        <TopBar />
        <main className="pane">
          <PrHeader />
          <PrStrip />
          <PrTabs tab={tab} setTab={setTab} />

          {tab === "products" && (
            <React.Fragment>
              <PrToolbar
                query={query} setQuery={setQuery}
                cat={cat} setCat={setCat}
                status={status} setStatus={setStatus}
                sort={sort} setSort={setSort}
                onAdd={() => handleEdit(null)}
                onImport={() => setImportOpen(true)}
                onBulk={() => setBulkOn((v) => !v)}
              />
              <ImportCard visible={importOpen} onClose={() => setImportOpen(false)} />
              <ProductsGrid items={filteredProducts} onEdit={handleEdit} onToggleHide={handleToggleHide} />
              <BulkBar visible={bulkOn} onClose={() => setBulkOn(false)} />
            </React.Fragment>
          )}

          {tab === "services" && (
            <React.Fragment>
              <PrToolbar
                query={query} setQuery={setQuery}
                cat={cat} setCat={setCat}
                status={status} setStatus={setStatus}
                sort={sort} setSort={setSort}
                onAdd={() => handleEdit(null)}
                onImport={() => setImportOpen(true)}
                onBulk={() => setBulkOn((v) => !v)}
              />
              <ServicesGrid items={services} onToggle={handleToggleService} />
            </React.Fragment>
          )}

          {tab === "categories" && (
            <React.Fragment>
              <CategoriesGrid items={CATEGORIES} />
            </React.Fragment>
          )}
        </main>
      </div>

      <EditModal product={edit} onClose={() => setEdit(null)} />
      <BottomNav current="products" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ProductsApp />);
</script>
</body>
</html>
