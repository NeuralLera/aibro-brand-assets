/* =====================================================================
   Icon registry — fetches SVG text, strips width/height for currentColor.
   ===================================================================== */
const { useState, useEffect, useMemo, useRef } = React;
const ICON_CACHE = new Map();

function loadIcon(path) {
  if (ICON_CACHE.has(path)) return ICON_CACHE.get(path);
  const p = fetch(path)
    .then((r) => (r.ok ? r.text() : ""))
    .then((txt) => {
      const clean = txt
        .replace(/<\?xml[^>]*\?>/, "")
        .replace(/<!--[\s\S]*?-->/g, "")
        .replace(/(<svg[^>]*?)\swidth="[^"]*"/, "$1")
        .replace(/(<svg[^>]*?)\sheight="[^"]*"/, "$1");
      ICON_CACHE.set(path, clean);
      return clean;
    });
  ICON_CACHE.set(path, p);
  return p;
}
function SvgIcon({ path, size = 20, style, className }) {
  const [html, setHtml] = useState(() => {
    const v = ICON_CACHE.get(path);
    return typeof v === "string" ? v : "";
  });
  useEffect(() => {
    let alive = true;
    Promise.resolve(loadIcon(path)).then((txt) => { if (alive) setHtml(txt); });
    return () => { alive = false; };
  }, [path]);
  const s = typeof size === "number" ? `${size}px` : size;
  return (
    <span
      className={className}
      aria-hidden="true"
      style={{ display: "inline-flex", width: s, height: s, flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: html }}
    />
  );
}
function Ico({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/${name}.svg`} size={size} style={style} className={className} />;
}
function IcoCore({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/ui-core/${name}.svg`} size={size} style={style} className={className} />;
}

const MAY2026_OFFSET = 4; // weekday index of May 1
const MAY2026_DAYS = 31;

function dowOfDay(d) {
  return (MAY2026_OFFSET + d - 1) % 7;
}
function isWeekend(d) {
  const x = dowOfDay(d);
  return x === 5 || x === 6;
}
function fmtDate(d) {
  return `${d} мая 2026`;
}
function fmtNum(n) {
  return new Intl.NumberFormat("ru-RU").format(n);
}

  const counts = useMemo(() => {

    return c;

/* =====================================================================
   MONTH VIEW
   ===================================================================== */
function MonthGrid({ posts, onDayOpen }) {
  // 5-row grid: Apr 27..30 + May 1..31 + Jun 1..7 (42 cells for guaranteed fit)
  // Apr 2026: 30 days, so prev-month tail = Apr 27, 28, 29, 30  (4 days when May starts on Fri)
  const cells = [];
  for (let i = 0; i < MAY2026_OFFSET; i++) {
    cells.push({ d: 27 + i, isOther: true });
  }
  for (let d = 1; d <= MAY2026_DAYS; d++) {
    cells.push({ d, isOther: false });
  }
  // Fill trailing
  let nextD = 1;
  while (cells.length % 7 !== 0 || cells.length < 35) {
    cells.push({ d: nextD++, isOther: true });
  }
  const byDay = useMemo(() => {
    const m = {};
    posts.forEach((p) => { (m[p.day] = m[p.day] || []).push(p); });
    Object.keys(m).forEach((k) => m[k].sort((a, b) => a.time.localeCompare(b.time)));
    return m;
  }, [posts]);

  return (
    <div className="cal-month">
      <div className="cal-month-hdr" role="row">
        {DOW_SHORT.map((d, i) => (
          <div key={d} className={`dow ${i >= 5 ? "weekend" : ""}`} role="columnheader">{d}</div>
        ))}
      </div>
      <div className="cal-month-body">
        {cells.map((c, i) => {
          const isToday  = !c.isOther && c.d === TODAY_DAY;
          const dayPosts = !c.isOther ? (byDay[c.d] || []) : [];
          const weekend  = !c.isOther && isWeekend(c.d);
          const visible  = dayPosts.slice(0, 3);
          const overflow = Math.max(0, dayPosts.length - 3);
          const klass = [
            "cal-day",
            c.isOther ? "is-other" : "",
            isToday ? "is-today" : "",
            weekend ? "is-weekend" : "",
          ].filter(Boolean).join(" ");
          return (
            <button
              key={i}
              type="button"
              className={klass}
              onClick={() => !c.isOther && onDayOpen(c.d)}
              aria-label={`${c.d} мая, ${dayPosts.length} постов`}
            >
              <div className="cal-day-top">
                <span className="cal-day-n">{c.d}</span>
                {!c.isOther && dayPosts.length > 0 ? (
                  <span className={`cal-day-count ${isToday ? "" : ""}`}>
                    <span className="dot"></span>
                    {dayPosts.length}
                  </span>
                ) : null}
              </div>
              {visible.map((p) => (
                <span
                  key={p.id}
                  className={`cal-mini ${p.status === "sent" ? "is-sent" : ""}`}
                  data-type={p.type}
                  title={p.title}
                >
                  <span className="t">{p.time}</span>
                  <span className="ttl">{p.title}</span>
                  {p.erid ? <span className="erid-mini">erid</span> : null}
                </span>
              ))}
              {overflow > 0 ? (
                <span className="cal-more">+ ещё {overflow}</span>
              ) : null}
              {!c.isOther && dayPosts.length === 0 ? (
                <span className="cal-add-hint" aria-hidden="true">+</span>
              ) : null}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* =====================================================================
   WEEK VIEW (May 11-17, today is 16)
   ===================================================================== */
function WeekView({ posts, onOpen }) {
  // Week: May 11 (Mon) .. May 17 (Sun)
  const WEEK_DAYS = [11, 12, 13, 14, 15, 16, 17];
  const HOURS = [];
  for (let h = 8; h <= 22; h++) HOURS.push(h);

  // Only show posts within this week
  const weekPosts = posts.filter((p) => WEEK_DAYS.includes(p.day));

  // Hour cell height = 56px (matches grid-auto-rows). One row per hour.
  const ROW_H = 56;
  // Now line: imagine current time is 14:35
  const nowTopPx = (14 - 8) * ROW_H + (35 / 60) * ROW_H;

  return (
    <div>
      <div className="cal-monthnav">
        <button type="button" className="bk-nav-btn" aria-label="Предыдущая неделя">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <button type="button" className="bk-nav-btn" aria-label="Следующая неделя">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6" /></svg>
        </button>
        <div className="range">11 — 17 мая 2026</div>
        <span className="today-pill">Эта неделя</span>
        <div className="spacer"></div>
      </div>

      <div className="cal-week">
        <div className="cal-week-hdr">
          <div className="corner"></div>
          {WEEK_DAYS.map((d) => {
            const isToday = d === TODAY_DAY;
            return (
              <div key={d} className={`cell ${isToday ? "is-today" : ""}`}>
                <span className="dow">{DOW_SHORT[dowOfDay(d)]}</span>
                <span className="d">{d}</span>
              </div>
            );
          })}
        </div>
        <div className="cal-week-grid" style={{ position: "relative" }}>
          {HOURS.map((h) => (
            <React.Fragment key={h}>
              <div className="time">{String(h).padStart(2, "0")}:00</div>
              {WEEK_DAYS.map((d) => {
                const cellPosts = weekPosts.filter((p) => {
                  const ph = parseInt(p.time.split(":")[0], 10);
                  return p.day === d && ph === h;
                });
                const isToday = d === TODAY_DAY;
                return (
                  <div key={`${h}-${d}`} className={`cell ${isToday ? "is-today" : ""}`} onClick={() => cellPosts[0] && onOpen(cellPosts[0])}>
                    <span className="plus" aria-hidden="true">+</span>
                    {cellPosts.map((p) => {
                      const m = parseInt(p.time.split(":")[1], 10);
                      const topPct = (m / 60) * 100;
                      return (
                        <button
                          key={p.id}
                          type="button"
                          className="cal-wpost"
                          data-type={p.type}
                          style={{ top: `${topPct}%`, height: "44px" }}
                          onClick={(e) => { e.stopPropagation(); onOpen(p); }}
                        >
                          <span className="t">{p.time}</span>
                          <span className="ttl">{p.title}</span>
                        </button>
                      );
                    })}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
          <div className="cal-week-now" style={{ top: `${nowTopPx}px` }} aria-hidden="true"></div>
        </div>
      </div>

      <Legend />
    </div>
  );
}

/* =====================================================================
   LIST VIEW
   ===================================================================== */
function ListView({ posts, onOpen }) {
  const [tab, setTab] = useState("all");
  const TABS = [
    { id: "all",       label: "Все",         n: posts.length },
    { id: "scheduled", label: "Запланировано", n: posts.filter((p) => p.status === "scheduled").length },
    { id: "sent",      label: "Опубликовано", n: posts.filter((p) => p.status === "sent").length },
    { id: "draft",     label: "Черновики",   n: posts.filter((p) => p.status === "draft").length },
  ];
  const filtered = tab === "all" ? posts : posts.filter((p) => p.status === tab);
  const sorted = [...filtered].sort((a, b) => {
    if (a.day !== b.day) return a.day - b.day;
    return a.time.localeCompare(b.time);
  });
  const ST_LABEL = { sent: "Опубликовано", scheduled: "Запланировано", draft: "Черновик", failed: "Ошибка" };

  return (
    <div className="cal-list-card">
      <div className="cal-list-tabs" role="tablist">
        {TABS.map((t) => (
          <button
            key={t.id}
            type="button"
            className={`pill ${tab === t.id ? "is-on" : ""}`}
            onClick={() => setTab(t.id)}
            role="tab"
            aria-selected={tab === t.id}
          >
            {t.label} <span className="n">{t.n}</span>
          </button>
        ))}
      </div>
      <div className="cal-list-wrap">
        <table className="cal-list">
          <thead>
            <tr>
              <th>Дата / Время</th>
              <th>Тип</th>
              <th>Заголовок</th>
              <th>Платформа</th>
              <th>Статус</th>
              <th style={{ textAlign: "right" }}>Действия</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((p) => (
              <tr key={p.id} onClick={() => onOpen(p)}>
                <td>
                  <div className="when">
                    {String(p.day).padStart(2, "0")}.05
                    <small>{DOW_SHORT[dowOfDay(p.day)]} · {p.time}</small>
                  </div>
                </td>
                <td>
                  <span className="type-cell">
                    <span className={`dot ${p.type}`}></span>
                    {TYPES[p.type].label}
                    {p.erid ? <span className="erid-mini" style={{ marginLeft: 6 }}>erid: {p.erid}</span> : null}
                  </span>
                </td>
                <td>
                  <div className="ttl">{p.title}<small>{p.preview}</small></div>
                </td>
                <td>
                  <span className="plat">
                    <span className="glyph">M</span>
                    MAX · {PLATFORM.handle}
                  </span>
                </td>
                <td>
                  <span className={`st ${p.status}`}>{ST_LABEL[p.status]}</span>
                </td>
                <td>
                  <div className="acts" style={{ justifyContent: "flex-end" }} onClick={(e) => e.stopPropagation()}>
                    <button type="button" className="act" aria-label="Редактировать" title="Редактировать">
                      <Ico name="icon-action-edit" size={16} />
                    </button>
                    <button type="button" className="act" aria-label="Перенести" title="Перенести">
                      <Ico name="calendar-clock" size={16} />
                    </button>
                    <button type="button" className="act" aria-label="Открыть в MAX" title="Открыть в MAX">
                      <Ico name="icon-action-external-link" size={16} />
                    </button>
                    <button type="button" className="act danger" aria-label="Удалить" title="Удалить">
                      <Ico name="icon-action-delete" size={16} />
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* =====================================================================
   Day drawer — list of posts for clicked day
   ===================================================================== */
function DayDrawer({ day, onClose, onOpenPost }) {
  const isOpen = day != null;
  const dayPosts = useMemo(() => {
    if (day == null) return [];
    return POSTS.filter((p) => p.day === day).sort((a, b) => a.time.localeCompare(b.time));
  }, [day]);

  const ST_LABEL = { sent: "Опубликовано", scheduled: "Запланировано", draft: "Черновик", failed: "Ошибка" };
  const dowLabel = day != null ? DOW_LONG[dowOfDay(day)] : "";

  return (
    <React.Fragment>
      <div className={`dw-scrim ${isOpen ? "is-open" : ""}`} onClick={onClose}></div>
      <aside className={`dw ${isOpen ? "is-open" : ""}`} aria-hidden={!isOpen} aria-label="Посты дня">
        <div className="dw-head">
          <div className="title-stack">
            <div className="num">{day != null ? fmtDate(day) : ""}</div>
            <div className="title">{dowLabel}</div>
            <div className="head-pills">
              <span className="cab-chip cab-chip--brand">{dayPosts.length} постов</span>
              {dayPosts.filter((p) => p.status === "scheduled").length > 0 ? (
                <span className="cab-chip cab-chip--info">{dayPosts.filter((p) => p.status === "scheduled").length} в очереди</span>
              ) : null}
              {dayPosts.filter((p) => p.erid).length > 0 ? (
                <span className="cab-chip cab-chip--warn">{dayPosts.filter((p) => p.erid).length} ОРД</span>
              ) : null}
            </div>
          </div>
          <button type="button" className="dw-close" aria-label="Закрыть" onClick={onClose}>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="6" y1="6" x2="18" y2="18" /><line x1="6" y1="18" x2="18" y2="6" />
            </svg>
          </button>
        </div>
        <div className="dw-body">
          {dayPosts.length === 0 ? (
            <div style={{ textAlign: "center", padding: "32px 0", color: "var(--fg-3)" }}>
              <Ico name="calendar" size={32} style={{ opacity: 0.4, marginBottom: 8 }} />
              <p style={{ margin: 0, fontSize: 14 }}>На этот день постов не запланировано</p>
            </div>
          ) : (
            <div className="cal-day-list">
              {dayPosts.map((p) => (
                <div key={p.id} className="cal-day-item">
                  <div className="when">
                    {p.time}
                    <small>{ST_LABEL[p.status]}</small>
                  </div>
                  <div className="body">
                    <div className="row1">
                      <span className="cab-chip" style={{
                        background: p.type === "ai"    ? "rgba(16,185,129,0.12)"
                                : p.type === "quick" ? "rgba(59,130,246,0.10)"
                                : p.type === "ord"   ? "rgba(245,158,11,0.12)"
                                : p.type === "promo" ? "rgba(139,92,246,0.10)"
                                                     : "rgba(6,182,212,0.10)",
                        color: p.type === "ai"    ? "var(--brand-700)"
                             : p.type === "quick" ? "var(--info-700)"
                             : p.type === "ord"   ? "var(--warning-700)"
                             : p.type === "promo" ? "#6d28d9"
                                                  : "#0e7490",
                        borderColor: "transparent",
                      }}>
                        {TYPES[p.type].label}
                      </span>
                      {p.erid ? <span className="erid-mini">erid: {p.erid}</span> : null}
                      <span className="ttl">{p.title}</span>
                    </div>
                    <p className="preview">{p.preview}</p>
                    <div className="acts">
                      <button type="button" className="lnk brand">
                        <Ico name="icon-action-edit" size={14} />
                        Редактировать
                      </button>
                      <button type="button" className="lnk">
                        <Ico name="calendar-clock" size={14} />
                        Перенести
                      </button>
                      <button type="button" className="lnk">
                        <Ico name="icon-action-external-link" size={14} />
                        Просмотр в MAX
                      </button>
                      <button type="button" className="lnk danger">
                        <Ico name="icon-action-delete" size={14} />
                        Удалить
                      </button>
                    </div>
                  </div>
                  <div className={`thumb ${p.img ? p.type : "muted"}`}>
                    {p.img ? (
                      <Ico name={p.type === "ord" ? "megaphone" : p.type === "promo" ? "gift-trial" : p.type === "quick" ? "icon-nav-quick-post" : p.type === "book" ? "icon-crm-bookings" : "image"} size={22} />
                    ) : (
                      <Ico name="image" size={22} />
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="dw-foot">
          <button type="button" className="cab-btn cab-btn--md cab-btn--primary grow">
            <Ico name="icon-action-add" size={16} />
            Добавить пост на {day != null ? `${day} мая` : ""}
          </button>
        </div>
      </aside>
    </React.Fragment>
  );
}

/* =====================================================================
   App
   ===================================================================== */
function CalendarApp() {
  const [view, setView] = useState("month");
  const [layers, setLayers] = useState({ ai: true, quick: true, ord: true, promo: true, book: false });
  const [autopostOn, setAutopostOn] = useState(true);
  const [activeDay, setActiveDay] = useState(null);
  // ESC closes drawer
  useEffect(() => {
    function onKey(e) { if (e.key === "Escape") setActiveDay(null); }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const toggleLayer = (id) => setLayers((s) => ({ ...s, [id]: !s[id] }));
  const filtered = useMemo(() => POSTS.filter((p) => layers[p.type]), [layers]);

  const onSchedule = () => alert("Открыть форму планирования поста (в макете)");
  const onOpenPost = (p) => alert(`Открыть пост ${p.id}: ${p.title} (в макете)`);

  const business = { ava: "У", name: "Пекарня «Уют»", handle: "@pekarnya_uyut" };

  return (
    <div className="dash" data-screen-label="07 Cabinet — Контент · Календарь">
      <Sidebar current="content" business={business} />
      <div className="work">
        <TopBar />
        <main className="pane">
          <CalHeader
            autopostOn={autopostOn}
            onToggleAutopost={() => setAutopostOn((v) => !v)}
            onSchedule={onSchedule}
          />

          {!autopostOn ? (
            <AutopostEmpty onEnable={() => setAutopostOn(true)} />
          ) : null}

          <ViewTabs view={view} setView={setView} />
          <LayerChips layers={layers} toggleLayer={toggleLayer} />

          {view === "month" ? (
            <div className="cal-grid">
              <div>
                <MonthNav />
                <MonthGrid posts={filtered} onDayOpen={setActiveDay} />
                <Legend />
              </div>
              <SidePanel onSchedule={onSchedule} />
            </div>
          ) : view === "week" ? (
            <div className="cal-grid">
              <WeekView posts={filtered} onOpen={onOpenPost} />
              <SidePanel onSchedule={onSchedule} />
            </div>
          ) : (
            <div className="cal-grid">
              <ListView posts={filtered} onOpen={onOpenPost} />
              <SidePanel onSchedule={onSchedule} />
            </div>
          )}
        </main>
      </div>

      <DayDrawer day={activeDay} onClose={() => setActiveDay(null)} onOpenPost={onOpenPost} />
      <BottomNav current="content" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CalendarApp />);
</script>
</body>
</html>
