<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>СММ АЙБРО · Кабинет — Боты и каналы</title>
  <link rel="icon" href="design/assets/logos/robot-icon-light.svg">
  <link rel="stylesheet" href="design/tokens.css">
  <link rel="stylesheet" href="design/atoms.css">
  <link rel="stylesheet" href="design/cabinet.css">
  <link rel="stylesheet" href="design/settings.css">
  <link rel="stylesheet" href="design/bots.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const ICO = "design/assets/icons/";

function Ic({ name, size = 18, style }) {
  return <img src={`${ICO}${name}.svg`} alt="" aria-hidden="true"
              style={{ width: size, height: size, display: "block", ...style }} />;
}

const NAV = [
  { id: "home",      label: "Главная",         icon: "icon-nav-home",       href: "Dashboard.html" },
  { id: "bots",      label: "Боты и каналы",   icon: "icon-nav-integrations", href: "Bots.html" },
  { id: "orders",    label: "Заказы",          icon: "icon-crm-orders",     href: "Orders.html",    badge: 7 },
  { id: "bookings",  label: "Записи",          icon: "icon-crm-bookings",   href: "Bookings.html",  badge: 12 },
  { id: "customers", label: "Клиенты",         icon: "icon-crm-customers",  href: "Customers.html" },
  { id: "products",  label: "Товары и услуги", icon: "icon-nav-products",   href: "Products.html" },
  { id: "content",   label: "Контент",         icon: "icon-nav-content",    href: "Calendar.html" },
  { id: "ai",        label: "ИИ-ассистент",    icon: "spark-ai" },
  { id: "analytics", label: "Аналитика",       icon: "chart-line" },
  { id: "marketing", label: "Маркетинг",       icon: "megaphone" },
  { id: "billing",   label: "Подписка",        icon: "price-tag-ruble",     href: "Billing.html" },
  { id: "settings",  label: "Настройки",       icon: "icon-nav-settings",   href: "Settings.html" },
];

function Sidebar({ current }) {
  return (
    <aside className="cab-side" aria-label="Главная навигация">
      <a className="cab-brand" href="Dashboard.html">
        <span className="cab-brand-tile"><img src="design/assets/logos/robot-icon-light.svg" alt="" /></span>
        <span>
          <span className="cab-brand-word">СММ <span style={{color:"var(--brand-700)"}}>АЙБРО</span></span>
          <div className="cab-brand-meta">Кабинет</div>
        </span>
      </a>

      <button className="cab-biz">
        <div className="cab-biz-ava" style={{background:"#fed7aa", color:"#9a3412"}}>У</div>
        <div>
          <div className="cab-biz-name">Пекарня «Уют»</div>
          <div className="cab-biz-handle">@pekarnya_uyut · Бакалея</div>
        </div>
        <Ic name="icon-action-expand" size={14} style={{opacity:0.4}} />
      </button>

      {NAV.map((it) => {
        const cls = `cab-nav-item ${current === it.id ? "active" : ""}`;
        const body = <>
          <span className="ico"><Ic name={it.icon} size={20} /></span>
          <span>{it.label}</span>
          {it.badge ? <span className="badge">{it.badge}</span> : null}
        </>;
        return it.href
          ? <a key={it.id} className={cls} href={it.href}>{body}</a>
          : <button key={it.id} className={cls}>{body}</button>;
      })}

      <div className="cab-side-foot">
        Тариф «Единый» · <b>4 990 ₽/мес</b><br/>
        До 24.06.2026 · <a href="Billing.html">Продлить</a>
      </div>
    </aside>
  );
}

function TopBar() {
  return (
    <header className="cab-top">
      <div>
        <div className="crumb">Кабинет / Боты и каналы</div>
        <h1>Боты и каналы</h1>
      </div>
      <div className="cab-top-actions">
        <button className="cab-iconbtn" aria-label="Уведомления">
          <Ic name="notification-bell" size={20} />
          <span className="dot"></span>
        </button>
        <div className="cab-profile" tabIndex="0">
          <div className="ava">А</div>
          <div className="meta">
            <span className="name">Анна П.</span>
            <span className="role">Владелец</span>
          </div>
        </div>
      </div>
    </header>
  );
}

/* ============================================================
   DATA
============================================================ */
const MODES = [
  {
    id: "platform-public",
    title: "Платформенный бот + общедоступный канал",
    desc: "Используете наш бот @aibro_bot, который ведёт ваш канал. Самый простой способ — без работы с MAXBotFather.",
    badges: [
      { kind: "ok",   label: "Простой" },
      { kind: "info", label: "5 мин" },
    ],
    icon: "icon-max-channel",
    iconAlt: false,
    recommended: true,
    cta: "Подключить",
  },
  {
    id: "platform-private",
    title: "Платформенный бот + приватный канал",
    desc: "Закрытый канал для подписчиков по invite-ссылке. Тот же платформенный бот, доступ только своим клиентам.",
    badges: [
      { kind: "info", label: "Закрытый канал" },
      { kind: "info", label: "5 мин" },
    ],
    icon: "icon-max-channel",
    iconAlt: true,
    cta: "Подключить",
  },
  {
    id: "byo-public",
    title: "Свой бот (BYO) + общедоступный канал",
    desc: "Если у вас уже есть свой MAX-бот. Принесите токен из @MAXBotFather — мы подключим его к каналу.",
    badges: [
      { kind: "warn", label: "BYO" },
      { kind: "info", label: "15 мин" },
      { kind: "neutral", label: "нужен токен" },
    ],
    icon: "icon-max-product-bot",
    iconAlt: false,
    cta: "Подключить через токен",
  },
  {
    id: "byo-private",
    title: "Свой бот (BYO) + приватный канал",
    desc: "Свой бот + закрытый канал по invite-ссылке. Полный контроль над брендом и аудиторией.",
    badges: [
      { kind: "warn", label: "BYO" },
      { kind: "info", label: "приватный" },
    ],
    icon: "icon-max-product-bot",
    iconAlt: true,
    cta: "Подключить",
  },
];

const CHANNELS = [
  {
    type: "channel",
    icon: "icon-max-channel",
    iconClass: "",
    name: "Пекарня «Уют»",
    handle: "@pekarnya_uyut",
    meta: [
      "1 412 подписчиков",
      "через платформенный бот",
      { chip: "ok", label: "В сети" },
      "последнее сообщение 2 мин назад",
    ],
  },
  {
    type: "bot",
    icon: "icon-max-product-bot",
    iconClass: "bot",
    name: "Бот @aibro_bot",
    handle: "platform · общий",
    meta: [
      "uptime 99,8%",
      { chip: "ok", label: "webhook" },
      "обработка 0,4 с",
    ],
  },
  {
    type: "support",
    icon: "icon-max-support-bot",
    iconClass: "support",
    name: "Бизнес-чат поддержки клиентов",
    handle: "@pekarnya_uyut_chat",
    meta: [
      "BYO бот",
      "12 активных диалогов",
      { chip: "ok", label: "Онлайн" },
    ],
  },
];

const INTEGRATIONS = [
  {
    state: "ok",
    icon: "shield-check",
    title: "MAX webhook",
    meta: [{ chip: "ok", label: "Здоров" }, "последний пинг 12 ч назад"],
  },
  {
    state: "ok",
    icon: "icon-max-channel",
    title: "MAX publisher",
    meta: [{ chip: "ok", label: "Здоров" }, "очередь 5 постов"],
  },
  {
    state: "warn",
    icon: "tag",
    title: "QR-сканер промо",
    meta: [{ chip: "warn", label: "Внимание" }, "требует обновления токена"],
  },
];

const AUDIT = [
  { time: "14:32",     icon: "icon-action-add",     text: <>Подключён канал <b>@pekarnya_uyut_chat</b> через токен MAXBotFather</>, actor: "Анна П. · Владелец" },
  { time: "12:00",     icon: "icon-action-refresh", text: <>Обновлён webhook MAX для бота <b>@aibro_bot</b></>, actor: "Иван Сидоров · поддержка" },
  { time: "вчера 18:30", icon: "post",              text: <>Бот <b>@aibro_bot</b> опубликовал 5 постов</>, actor: "автоматически · ИИ-планировщик" },
  { time: "вчера 09:15", icon: "icon-action-edit",  text: <>Изменены настройки тона ответов ИИ — «дружелюбный»</>, actor: "Анна П. · Владелец" },
  { time: "12.05 16:40", icon: "shield-check",      text: <>Прошла проверка mTLS-сертификата канала</>, actor: "автоматически · cron" },
];

/* ============================================================
   COMPONENTS
============================================================ */
function ChipBadge({ kind, label }) {
  const cls = `cab-chip ${
    kind === "ok"   ? "cab-chip-ok"   :
    kind === "warn" ? "cab-chip-warn" :
    kind === "info" ? "cab-chip-info" :
    "cab-chip-mute"
  }`;
  return <span className={cls}>{label}</span>;
}

function ModeCard({ mode }) {
  return (
    <div className={`bots-mode-card ${mode.recommended ? "recommended" : ""}`}>
      {mode.recommended && <span className="reco">рекомендуем</span>}
      <div className={`bots-mode-icon ${mode.iconAlt ? "alt" : ""}`}>
        <Ic name={mode.icon} size={26} />
      </div>
      <div className="bots-mode-title">{mode.title}</div>
      <div className="bots-mode-desc">{mode.desc}</div>
      <div className="bots-mode-foot">
        <div className="bots-mode-badges">
          {mode.badges.map((b, i) => <ChipBadge key={i} kind={b.kind} label={b.label} />)}
        </div>
        <button className="btn btn-primary">
          {mode.cta} <span aria-hidden="true">→</span>
        </button>
      </div>
    </div>
  );
}

function ChannelRow({ ch }) {
  return (
    <div className="bots-channel-row">
      <div className={`bots-channel-icon ${ch.iconClass}`}>
        <Ic name={ch.icon} size={22} />
      </div>
      <div className="bots-channel-info">
        <div className="bots-channel-name">
          {ch.name}
          <span className="bots-channel-handle">{ch.handle}</span>
        </div>
        <div className="bots-channel-meta">
          {ch.meta.map((m, i) => (
            <React.Fragment key={i}>
              {i > 0 && <span className="dot-sep">·</span>}
              {typeof m === "string"
                ? <span>{m}</span>
                : <ChipBadge kind={m.chip} label={"✓ " + m.label} />}
            </React.Fragment>
          ))}
        </div>
      </div>
      <div className="bots-channel-actions">
        <button className="btn btn-ghost"><Ic name="icon-action-edit" size={13} /> Настроить</button>
        <button className="btn btn-ghost"><Ic name="icon-action-external-link" size={13} /></button>
      </div>
    </div>
  );
}

function IntegrationCard({ it }) {
  return (
    <div className={`bots-integration-card ${it.state}`}>
      <div className="bots-integration-icon">
        <Ic name={it.icon} size={18} />
      </div>
      <div style={{minWidth:0, flex:1}}>
        <div className="bots-integration-title">{it.title}</div>
        <div className="bots-integration-meta">
          {it.meta.map((m, i) => (
            <React.Fragment key={i}>
              {typeof m === "string"
                ? <span>{m}</span>
                : <ChipBadge kind={m.chip} label={"✓ " + m.label} />}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT
============================================================ */
function App() {
  return (
    <div className="cab-shell">
      <Sidebar current="bots" />
      <main className="cab-main">
        <TopBar />
        <div className="cab-content">
          <div className="bots-head">
            <div>
              <h2>Подключите канал MAX и бизнес-чат</h2>
              <div className="sub">1 канал и 2 бота уже подключены · 4 режима подключения на выбор</div>
            </div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-secondary">
                <Ic name="icon-action-refresh" size={13} /> Проверить состояние
              </button>
              <button className="btn btn-secondary">
                <Ic name="icon-nav-help" size={13} /> Справка
              </button>
            </div>
          </div>

          {/* 4 modes 2x2 */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>4 режима подключения</h3>
                <p>Выберите способ — управляйте каналом из кабинета</p>
              </div>
            </div>
            <div className="bots-modes">
              {MODES.map(m => <ModeCard key={m.id} mode={m} />)}
            </div>
          </section>

          {/* Connected channels */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>Подключённые каналы и боты</h3>
                <p>Активные интеграции — каналы, общественные/приватные группы, ИИ-боты</p>
              </div>
              <button className="btn btn-primary">
                <Ic name="icon-action-add" size={13} /> Добавить канал
              </button>
            </div>
            <div className="bots-channels">
              {CHANNELS.map((c, i) => <ChannelRow key={i} ch={c} />)}
            </div>
          </section>

          {/* Integrations status */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>Состояние интеграций</h3>
                <p>Webhook, publisher, сканер промо — мониторинг в реальном времени</p>
              </div>
              <button className="btn btn-ghost">
                <Ic name="icon-action-refresh" size={13} /> Обновить
              </button>
            </div>
            <div className="bots-integration-grid">
              {INTEGRATIONS.map((it, i) => <IntegrationCard key={i} it={it} />)}
            </div>

            <div className="cab-callout cab-callout-info" style={{marginTop:14}}>
              <Ic name="icon-status-info" size={18} />
              <div>
                <b>QR-сканер промо требует внимания.</b><br/>
                Сертификат продлевается автоматически. Если статус не зелёный
                через 24 часа — нажмите «Перезапустить» в карточке выше или напишите в поддержку.
              </div>
            </div>
          </section>

          {/* Audit log */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>Журнал событий</h3>
                <p>Последние 5 изменений · автоматические и ручные действия</p>
              </div>
              <button className="btn btn-ghost">
                <Ic name="timeline" size={13} /> Открыть полный журнал
              </button>
            </div>
            <div className="cab-card">
              <div className="bots-audit-timeline">
                {AUDIT.map((e, i) => (
                  <div key={i} className="bots-audit-row">
                    <div className="bots-audit-time">{e.time}</div>
                    <div className="bots-audit-dot"><Ic name={e.icon} size={12} /></div>
                    <div>
                      <div className="bots-audit-text">{e.text}</div>
                      <div className="bots-audit-actor">{e.actor}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
