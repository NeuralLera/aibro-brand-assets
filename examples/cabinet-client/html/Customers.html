/* =====================================================================
   Icon registry — fetches SVG text, strips width/height for currentColor.
   ===================================================================== */
const { useState, useEffect, useMemo, useRef } = React;
const ICON_CACHE = new Map();

function loadIcon(path) {
  if (ICON_CACHE.has(path)) return ICON_CACHE.get(path);
  const p = fetch(path)
    .then((r) => (r.ok ? r.text() : ""))
    .then((txt) => {
      const clean = txt
        .replace(/<\?xml[^>]*\?>/, "")
        .replace(/<!--[\s\S]*?-->/g, "")
        .replace(/(<svg[^>]*?)\swidth="[^"]*"/, "$1")
        .replace(/(<svg[^>]*?)\sheight="[^"]*"/, "$1");
      ICON_CACHE.set(path, clean);
      return clean;
    });
  ICON_CACHE.set(path, p);
  return p;
}
function SvgIcon({ path, size = 20, style, className }) {
  const [html, setHtml] = useState(() => {
    const v = ICON_CACHE.get(path);
    return typeof v === "string" ? v : "";
  });
  useEffect(() => {
    let alive = true;
    Promise.resolve(loadIcon(path)).then((txt) => { if (alive) setHtml(txt); });
    return () => { alive = false; };
  }, [path]);
  const s = typeof size === "number" ? `${size}px` : size;
  return (
    <span
      className={className}
      aria-hidden="true"
      style={{ display: "inline-flex", width: s, height: s, flexShrink: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: html }}
    />
  );
}
function Ico({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/${name}.svg`} size={size} style={style} className={className} />;
}
function IcoCore({ name, size = 20, style, className }) {
  return <SvgIcon path={`assets/icons/ui-core/${name}.svg`} size={size} style={style} className={className} />;
}

// Avatar background palette (deterministic by initials)
const AVA_COLORS = [
  "#0e7490", "#8b5cf6", "#059669", "#dc2626", "#d97706",
  "#0284c7", "#7c3aed", "#16a34a", "#db2777", "#0891b2",
];
function avaColor(initials) {
  let h = 0;
  for (let i = 0; i < initials.length; i++) h = (h * 31 + initials.charCodeAt(i)) & 0xffff;
  return AVA_COLORS[h % AVA_COLORS.length];
}
function getInitials(name) {
  const parts = name.split(/\s+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return parts[0].slice(0, 2).toUpperCase();
}

        {/* Body */}

          {tab === "bookings" && <BookingsTab customer={customer} />}

}

/* =====================================================================

function CustomersGrid({ items, onOpen }) {
  if (items.length === 0) {
    return (
      <div className="cu-grid">
        <div className="cu-empty">
          Ничего не нашлось. Попробуйте изменить фильтр или сбросить поиск.
        </div>
      </div>
    );
  }
  return (
    <div className="cu-grid">
      {items.map((c) => <CustomerCard key={c.id} c={c} onOpen={onOpen} />)}
    </div>
  );
}

/* =====================================================================
   App
   ===================================================================== */
function CustomersApp() {
  const [query, setQuery] = useState("");
  const [tag, setTag] = useState("all");
  const [status, setStatus] = useState("all");
  const [sort, setSort] = useState("ltv");
  const [active, setActive] = useState(null);

  const filtered = useMemo(() => {
    let list = CUSTOMERS.slice();
    if (tag !== "all") list = list.filter((c) => c.tags.includes(tag));
    if (status !== "all") list = list.filter((c) => c.status === status);
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      list = list.filter((c) => `${c.name} ${c.phone} ${c.id}`.toLowerCase().includes(q));
    }
    if (sort === "ltv") list.sort((a, b) => b.ltv - a.ltv);
    if (sort === "recent") list.sort((a, b) => (b.lastOrder || "").localeCompare(a.lastOrder || ""));
    if (sort === "name") list.sort((a, b) => a.name.localeCompare(b.name, "ru"));
    if (sort === "since") list.sort((a, b) => (b.since || "").localeCompare(a.since || ""));
    return list;
  }, [query, tag, status, sort]);

  const business = { ava: "У", name: "Пекарня «Уют»", handle: "@pekarnya_uyut" };

  return (
    <div className="dash" data-screen-label="04 Cabinet — Клиенты">
      <Sidebar current="customers" business={business} />
      <div className="work">
        <TopBar />
        <main className="pane">
          <CuHeader onAdd={() => alert("Добавить клиента (заглушка)")} onImport={() => alert("Импорт CSV (заглушка)")} />
          <CuKpis />
          <CuToolbar
            query={query} setQuery={setQuery}
            tag={tag} setTag={setTag}
            status={status} setStatus={setStatus}
            sort={sort} setSort={setSort}
          />
          <CustomersGrid items={filtered} onOpen={setActive} />
        </main>
      </div>

      <CuDrawer customer={active} onClose={() => setActive(null)} />
      <BottomNav current="customers" />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<CustomersApp />);
