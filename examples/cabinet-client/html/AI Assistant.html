function LinePath({ data, w, h, pad = 10 }) {
  const max = Math.max(...data, 1);
  const sx = (w - 2 * pad) / (data.length - 1);
  const points = data.map((v, i) => [pad + i * sx, h - pad - (v / max) * (h - 2 * pad)]);
  const d = points.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const dArea = d + ` L ${w - pad} ${h - pad} L ${pad} ${h - pad} Z`;
  return (
    <>
      <path d={dArea} fill="url(#ai-grad)" />
      <path d={d} stroke="var(--brand-600)" strokeWidth="2" fill="none" />
      {points.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="2.2" fill="var(--brand-600)" />
      ))}
    </>
  );
}

function Donut({ slices, size = 140, stroke = 20 }) {
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const total = slices.reduce((s, x) => s + x.v, 0);
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg-subtle)" strokeWidth={stroke} />
      {slices.map((s, i) => {
        const frac = s.v / total;
        const dash = frac * C;
        const off = -acc * C;
        acc += frac;
        return (
          <circle key={i} cx={size/2} cy={size/2} r={r}
                  fill="none" stroke={s.color} strokeWidth={stroke}
                  strokeDasharray={`${dash} ${C - dash}`}
                  strokeDashoffset={off}
                  transform={`rotate(-90 ${size/2} ${size/2})`} />
        );
      })}
      <text x={size/2} y={size/2 - 2} textAnchor="middle"
            style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:18, fill:"var(--fg-1)"}}>
        {fmt(total)}
      </text>
      <text x={size/2} y={size/2 + 14} textAnchor="middle"
            style={{fontFamily:"var(--font-body)", fontSize:11, fill:"var(--fg-3)"}}>
        ответов
      </text>
    </svg>
  );
}
