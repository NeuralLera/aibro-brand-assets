function Sparkline({ data, color = "var(--brand-600)", up = true }) {
  const w = 100, h = 28, pad = 2;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const sx = (w - 2 * pad) / (data.length - 1);
  const pts = data.map((v, i) => [pad + i * sx, h - pad - ((v - min) / range) * (h - 2 * pad)]);
  const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const dArea = d + ` L ${w - pad} ${h - pad} L ${pad} ${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <path d={dArea} fill={up ? "rgba(16, 185, 129, 0.12)" : "rgba(239, 68, 68, 0.12)"} />
      <path d={d} stroke={up ? "var(--brand-600)" : "#b91c1c"} strokeWidth="1.5" fill="none" />
    </svg>
  );
}

function DualLineChart({ revenue, orders }) {
  const w = 760, h = 240, pad = 36;
  const maxR = Math.max(...revenue), maxO = Math.max(...orders);
  const sx = (w - 2 * pad) / (revenue.length - 1);
  const ptsR = revenue.map((v, i) => [pad + i * sx, h - pad - (v / maxR) * (h - 2 * pad)]);
  const ptsO = orders.map((v, i)  => [pad + i * sx, h - pad - (v / maxO) * (h - 2 * pad)]);
  const dR = ptsR.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const dO = ptsO.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  const dArea = dR + ` L ${w - pad} ${h - pad} L ${pad} ${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="an-chart">
      <defs>
        <linearGradient id="rev-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="rgba(16, 185, 129, 0.28)" />
          <stop offset="100%" stopColor="rgba(16, 185, 129, 0.02)" />
        </linearGradient>
      </defs>
      <g className="grid">
        <line x1={pad} y1={pad}                     x2={w - pad} y2={pad} />
        <line x1={pad} y1={pad + (h - 2*pad) / 4}   x2={w - pad} y2={pad + (h - 2*pad) / 4} />
        <line x1={pad} y1={pad + (h - 2*pad) / 2}   x2={w - pad} y2={pad + (h - 2*pad) / 2} />
        <line x1={pad} y1={pad + 3*(h - 2*pad) / 4} x2={w - pad} y2={pad + 3*(h - 2*pad) / 4} />
        <line x1={pad} y1={h - pad}                 x2={w - pad} y2={h - pad} />
      </g>
      <path d={dArea} fill="url(#rev-grad)" />
      <path d={dR} stroke="var(--brand-600)" strokeWidth="2.5" fill="none" />
      <path d={dO} stroke="#3b82f6" strokeWidth="2" strokeDasharray="4 4" fill="none" />

      {/* Y axis left — revenue */}
      <g className="axis-y">
        <text x={pad - 6} y={pad + 4}                   textAnchor="end">{fmt(Math.round(maxR/1000))}k ₽</text>
        <text x={pad - 6} y={pad + (h - 2*pad)/2 + 4}   textAnchor="end">{fmt(Math.round(maxR/2000))}k ₽</text>
        <text x={pad - 6} y={h - pad + 4}               textAnchor="end">0</text>
      </g>
      {/* Y axis right — orders */}
      <g className="axis-y">
        <text x={w - pad + 6} y={pad + 4}               textAnchor="start" style={{fill:"#3b82f6"}}>{maxO}</text>
        <text x={w - pad + 6} y={pad + (h - 2*pad)/2 + 4} textAnchor="start" style={{fill:"#3b82f6"}}>{Math.round(maxO/2)}</text>
        <text x={w - pad + 6} y={h - pad + 4}           textAnchor="start" style={{fill:"#3b82f6"}}>0</text>
      </g>
      <g className="axis-x">
        <text x={pad}         y={h - pad + 18}>16.04</text>
        <text x={w/2 - 14}    y={h - pad + 18}>30.04</text>
        <text x={w - pad - 28} y={h - pad + 18}>15.05</text>
      </g>
    </svg>
  );
}

function Donut({ slices, size = 140, stroke = 22 }) {
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  const total = slices.reduce((s, x) => s + x.v, 0);
  let acc = 0;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bg-subtle)" strokeWidth={stroke} />
      {slices.map((s, i) => {
        const frac = s.v / total;
        const dash = frac * C;
        const off = -acc * C;
        acc += frac;
        return (
          <circle key={i} cx={size/2} cy={size/2} r={r}
                  fill="none" stroke={s.color} strokeWidth={stroke}
                  strokeDasharray={`${dash} ${C - dash}`}
                  strokeDashoffset={off}
                  transform={`rotate(-90 ${size/2} ${size/2})`} />
        );
      })}
      <text x={size/2} y={size/2 - 2} textAnchor="middle"
            style={{fontFamily:"var(--font-display)", fontWeight:700, fontSize:20, fill:"var(--fg-1)"}}>
        100%
      </text>
      <text x={size/2} y={size/2 + 16} textAnchor="middle"
            style={{fontFamily:"var(--font-body)", fontSize:11, fill:"var(--fg-3)"}}>
        источников
      </text>
    </svg>
  );
}

/* ============================================================
   HEATMAP (7 days x 24 hours)
============================================================ */
const DAYS = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

// 7x24 intensities 0..5, peak Tue 18:00
function buildHeat() {
  const out = [];
  for (let d = 0; d < 7; d++) {
    const row = [];
    for (let h = 0; h < 24; h++) {
      let v = 0;
      // off-hours
      if (h < 9 || h >= 22) v = 0;
      // morning
      else if (h < 12) v = 1 + ((d + h) % 2);
      // lunch
      else if (h < 14) v = 2 + ((d + h) % 2);
      // afternoon
      else if (h < 17) v = 2 + ((h + d) % 3);
      // peak evening
      else if (h < 20) v = 3 + ((d + h) % 3);
      // late evening
      else v = 2;

      // weekend boost
      if (d >= 5 && h >= 11 && h < 20) v = Math.min(5, v + 1);
      // Tue peak amplify
      if (d === 1 && h === 18) v = 5;
      // Tue 17/19 strong
      if (d === 1 && (h === 17 || h === 19)) v = 4;

      row.push(v);
    }
    out.push(row);
  }
  return out;
}
const HEAT = buildHeat();

                        <td key={j} className={cohortClass(v)}>
                          {v === null || v === undefined ? "" : v + "%"}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>

          {/* LTV BREAKDOWN */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>LTV — пожизненная ценность клиента</h3>
                <p>Средняя сумма, которую клиент приносит за всё время</p>
              </div>
            </div>
            <div className="cab-card">
              <div className="an-ltv-headline">
                <span className="v">4 200 ₽</span>
                <span className="l">средний LTV по бизнесу · топ-10% клиентов — <b style={{color:"var(--fg-1)"}}>12 400 ₽</b></span>
              </div>

              <div className="an-ltv-row">
                {/* Histogram */}
                <div>
                  <h4 style={{margin:"0 0 12px", fontFamily:"var(--font-display)", fontSize:13, fontWeight:700}}>Распределение LTV</h4>
                  <div className="an-hist">
                    {LTV_HIST.map((b, i) => {
                      const maxV = Math.max(...LTV_HIST.map(x => x.v));
                      const h = ((b.v / maxV) * 100).toFixed(0) + "%";
                      return (
                        <div className="an-hist-bar" key={i}>
                          <span className="v">{b.v}</span>
                          <div className="bar" style={{height: h}}></div>
                          <span className="l">{b.range}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>

                {/* Top 10 */}
                <div>
                  <h4 style={{margin:"0 0 12px", fontFamily:"var(--font-display)", fontSize:13, fontWeight:700}}>Топ-10 клиентов по LTV</h4>
                  <table className="cab-tbl">
                    <thead>
                      <tr>
                        <th>Клиент</th>
                        <th style={{textAlign:"right"}}>Заказов</th>
                        <th style={{textAlign:"right"}}>LTV</th>
                      </tr>
                    </thead>
                    <tbody>
                      {LTV_TOP.map((c, i) => (
                        <tr key={i}>
                          <td><b>{c.name}</b></td>
                          <td className="num">{c.count}</td>
                          <td className="num"><b style={{color:"var(--brand-700)"}}>{fmtRub(c.ltv)}</b></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>

          {/* FUNNEL */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>Воронка CRM</h3>
                <p>От запроса в MAX до оплаченного заказа · за месяц</p>
              </div>
            </div>
            <div className="cab-card">
              <div className="an-funnel">
                {FUNNEL.map((f, i) => {
                  const pct = ((f.v / FUNNEL[0].v) * 100).toFixed(0);
                  const w = ((f.v / FUNNEL[0].v) * 100).toFixed(0) + "%";
                  return (
                    <div className="an-funnel-row" key={i}>
                      <div className="name">
                        {f.name}
                        <small>{f.sub}</small>
                      </div>
                      <div className={`bar ${f.stage}`} style={{width: w}}>
                        <span className="lbl">{f.v}</span>
                      </div>
                      <div className="pct">
                        {pct}%
                        <small>{i === 0 ? "100% базы" : `от запросов`}</small>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="cab-callout cab-callout-emerald">
                <Ic name="spark-ai" size={18} />
                <div>
                  <b>Drop-off на «Подтверждение владельцем» — 13%.</b> Это 12 клиентов в месяц.
                  Проверьте push-уведомления в MAX (вкладка Настройки → Push) — возможно, владелец
                  не успевает реагировать в течение 15 минут (после этого клиенты передумывают).
                </div>
              </div>
            </div>
          </section>

          {/* HEATMAP */}
          <section className="cab-section">
            <div className="cab-section-head">
              <div>
                <h3>Активность по часам и дням</h3>
                <p>Когда клиенты пишут вам чаще — спланируйте присутствие владельца</p>
              </div>
            </div>
            <div className="cab-card">
              <div className="an-heatmap">
                <div className="h-corner"></div>
                {Array.from({length:24}).map((_, h) => (
                  <div key={"h" + h} className="h-hour">{h % 3 === 0 ? h : ""}</div>
                ))}
                {DAYS.map((d, di) => (
                  <React.Fragment key={d}>
                    <div className="h-day">{d}</div>
                    {HEAT[di].map((v, hi) => {
                      const cls = v === 0 ? "h-cell" : `h-cell l${v}`;
                      const peak = (di === 1 && hi === 18) ? " peak" : "";
                      return <div key={hi} className={cls + peak}
                                  title={`${d} ${hi}:00 — ${v} ед.`}></div>;
                    })}
                  </React.Fragment>
                ))}
              </div>

              <div className="an-heatmap-legend">
                <span>Меньше</span>
                <div className="scale">
                  <span style={{background:"rgba(16, 185, 129, 0.05)"}}></span>
                  <span style={{background:"rgba(16, 185, 129, 0.10)"}}></span>
                  <span style={{background:"rgba(16, 185, 129, 0.22)"}}></span>
                  <span style={{background:"rgba(16, 185, 129, 0.38)"}}></span>
                  <span style={{background:"rgba(16, 185, 129, 0.55)"}}></span>
                  <span style={{background:"rgba(16, 185, 129, 0.75)"}}></span>
                </div>
                <span>Больше</span>
                <span style={{marginLeft:"auto", fontFamily:"var(--font-body)", color:"var(--brand-700)", fontWeight:600}}>
                  <Ic name="spark-ai" size={12} style={{display:"inline-block", verticalAlign:"-2px", marginRight:4}} />
                  Пиковая активность — Вт 18:00
                </span>
              </div>
            </div>
          </section>

          {/* EXPORT BAR */}
          <div className="an-export-bar">
            <span className="meta">
              <Ic name="status-checkmark-done" size={14} />
              Данные актуальны на <b>15.05.2026, 17:42 МСК</b>
            </span>
            <button className="btn btn-secondary"><Ic name="icon-action-download" size={13} /> PDF report</button>
            <button className="btn btn-secondary"><Ic name="icon-action-export" size={13} /> CSV raw data</button>
            <button className="btn btn-primary"><Ic name="notification-bell" size={13} /> Ежемесячный email-отчёт</button>
          </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
